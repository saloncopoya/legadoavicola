<div class="card">
    <h2>👤 Mi Perfil</h2>
    <form id="perfilForm">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="perfilNombre">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="perfilEmail" readonly>
        </div>
        <button type="submit" class="btn btn-primary">Actualizar Perfil</button>
        <button type="button" class="btn btn-danger" id="logoutBtn" style="margin-left:12px">Cerrar Sesión</button>
    </form>
</div>
