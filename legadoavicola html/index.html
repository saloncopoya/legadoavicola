        let deferredPrompt = null;

        function isPWAInstalled() {

        // Escuchar el evento beforeinstallprompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;

            if (!isPWAInstalled() && !overlayShown) {

        function showInstallOverlay() {

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isAndroid = /Android/i.test(navigator.userAgent);

                installText = "Agregar a pantalla de inicio";
            } else if (isAndroid) {
                installText = "Instalar App";

                    }
                    overlay.remove();
                });
            }
            
            if (laterBtn) {
                laterBtn.addEventListener('click', () => {
                    overlay.remove();
                });
            }
            
            // También cerrar al hacer click fuera (opcional)
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.remove();
                }
            });
        }

        // Función para obtener todos los parámetros de la URL actual
        function getCurrentUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const paramObj = {};
            for (const [key, value] of params.entries()) {
                paramObj[key] = value;
            }
            return paramObj;
        }
        
        // Función para construir la URL del blog con los mismos parámetros
        function buildBlogUrlWithParams() {
            const params = getCurrentUrlParams();
            const paramKeys = Object.keys(params);
            
            // Si no hay parámetros, retornar la URL base
            if (paramKeys.length === 0) {
                return BLOG_BASE_URL;
            }
            
            // Construir URL con parámetros
            const urlParams = new URLSearchParams();
            for (const [key, value] of Object.entries(params)) {
                urlParams.append(key, value);
            }
            
            return `${BLOG_BASE_URL}?${urlParams.toString()}`;
        }

        const iframe = document.getElementById('blogFrame');
        const iframeLoader = document.getElementById('iframeLoader');
        const connStatusSpan = document.getElementById('connStatusText');
        
        let isOnline = navigator.onLine;
        let swRegistration = null;

        // Cambiar entre modo online/offline
        function setMode(online) {
            isOnline = online;
            
            if (online) {
                onlineMode.classList.remove('hidden');
                offlineMode.classList.remove('active');
                connStatusSpan.innerHTML = '🟢 Online';
                // Aplicar redirección por URL personalizada al volver online
                redirectIframeToUrlParams();
            } else {
                onlineMode.classList.add('hidden');
                offlineMode.classList.add('active');
                connStatusSpan.innerHTML = '🔴 Offline';
                
                // Cargar sección offline según los parámetros de URL
                const params = getCurrentUrlParams();
                let sectionToLoad = 'inicio';
                
                if (params.section) {
                    const sectionMap = {
                        'guias': 'guias',
                        'sanidad': 'sanidad',
                        'alimentacion': 'alimentacion',
                        'emergencia': 'emergencia'
                    };
                    sectionToLoad = sectionMap[params.section] || 'inicio';
                }
                
                loadOfflineSection(sectionToLoad);
            }
        }

        // Cargar sección offline
        function loadOfflineSection(sectionId) {
            const data = offlineData[sectionId];
            if (data) {
                document.getElementById('offlineContent').innerHTML = data.content;
                // Actualizar active en navegación
                document.querySelectorAll('.offline-nav-btn').forEach(btn => {
                    if (btn.dataset.section === sectionId) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
        }

        // Detectar cambios de conexión
        window.addEventListener('online', () => {
            setMode(true);
            showToast("🌐 Conexión restaurada - Cargando blog...", 3000);
        });
        
        window.addEventListener('offline', () => {
            setMode(false);
            showToast("📡 Sin internet - Usando contenido offline", 3000);
        });

        // Iframe load event
        iframe.addEventListener('load', () => {
            iframeLoader.style.display = 'none';
        });

        iframe.addEventListener('error', () => {
            iframeLoader.style.display = 'none';
            if (!navigator.onLine) {
                setMode(false);
            }
        });

        // Service Worker Registration
        async function registerSW() {
            if (!('serviceWorker' in navigator)) return;
            
            try {
                const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
                console.log('SW registrado:', registration);
                swRegistration = registration;
                return registration;
            } catch (error) {
                console.error('SW registration failed:', error);
            }
        }

        // Toast
        function showToast(msg, duration) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '70px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = '#333';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '30px';
            toast.style.zIndex = '2000';
            toast.style.fontSize = '0.85rem';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        // Event listeners para navegación offline
        document.querySelectorAll('.offline-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                loadOfflineSection(btn.dataset.section);
            });
        });
        
        // Manejar cambios en el historial (botones atrás/adelante)
        window.addEventListener('popstate', () => {
            if (navigator.onLine) {
                redirectIframeToUrlParams();
            } else {
                const params = getCurrentUrlParams();
                let sectionToLoad = 'inicio';
                if (params.section) {
                    const sectionMap = {
                        'guias': 'guias',
                        'sanidad': 'sanidad',
                        'alimentacion': 'alimentacion',
                        'emergencia': 'emergencia'
                    };
                    sectionToLoad = sectionMap[params.section] || 'inicio';
                }
                loadOfflineSection(sectionToLoad);
            }
        });
        
        
        // Inicialización
        async function init() {
            await registerSW();
            
            // APLICAR REDIRECCIÓN POR URL PERSONALIZADA AL INICIO
            const targetUrl = buildBlogUrlWithParams();
            iframe.src = targetUrl;
            console.log(`🚀 Inicializado con URL destino: ${targetUrl}`);
            
            setMode(navigator.onLine);
            
            // Mostrar loader del iframe por unos segundos
            setTimeout(() => {
                iframeLoader.style.display = 'none';
            }, 5000);
        }
        
        init();
    </script>
</body>
</html>
