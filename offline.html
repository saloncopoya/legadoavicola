<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid #8B4513;
        }
        h1 { color: #8B4513; margin-bottom: 16px; }
        p { color: #495057; margin-bottom: 24px; line-height: 1.5; }
        button {
            background: #8B4513;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 64px;">📡</div>
        <h1>Sin Conexión a Internet</h1>
        <p>La aplicación está funcionando en modo offline. Vuelve a conectarte para sincronizar los datos, pero puedes seguir usando el sistema normalmente.</p>
        <button onclick="location.reload()">Reintentar</button>
    </div>
</body>
</html>
