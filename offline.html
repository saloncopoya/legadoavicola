<!-- offline.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión - GallosLive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1877f2, #00c6ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .offline-container {
            text-align: center;
            padding: 20px;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        p {
            margin-bottom: 24px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            color: #1877f2;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            margin: 8px;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Sin conexión a internet</h1>
        <p>No te preocupes, GallosLive sigue funcionando offline.<br>Vuelve a conectarte para sincronizar tus datos.</p>
        <a href="/" class="btn">Ir al inicio</a>
        <button onclick="location.reload()" class="btn btn-outline">Reintentar</button>
    </div>
    
    <script>
        // Intentar recargar cuando haya conexión
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
