<script>

      get(key, uid, maxAge=30*24*3600*1000) { try { let raw = localStorage.getItem(`app_${key}_${uid}`); if(!raw) return null; let obj = JSON.parse(raw); if(obj.v !== '2.0' || Date.now() - obj.ts > maxAge) { localStorage.removeItem(`app_${key}_${uid}`); return null; } return obj.data; } catch(e){ return null; } },

      getGlobal(key, maxAge=30*24*3600*1000) { let raw = localStorage.getItem(`app_global_${key}`); if(!raw) return null; let obj=JSON.parse(raw); if(obj.v !== '2.0' || Date.now()-obj.ts > maxAge) return null; return obj.data; }

    function notify(prop) { if(state._isNotifying) return; state._isNotifying=true; state.subscribers.forEach(cb=>cb(prop)); state._isNotifying=false; }

      setScreen(screen) { if(window[`${screen}Killer`] && typeof window[`${screen}Killer`]==='function') window[`${screen}Killer`](); state.ui.currentScreen = screen; localStorage.setItem('lastScreen', screen); notify('screen'); },
      setLoading(loading) { state.ui.isLoading = loading; notify('loading'); },
      addNotification(msg, type='info', dur=5000) { let cont=document.getElementById('toast-container'); if(!cont) return; let toast=document.createElement('div'); toast.className=`toast ${type}`; toast.innerText=msg; cont.appendChild(toast); setTimeout(()=>{ toast.classList.add('fade-out'); setTimeout(()=>toast.remove(),300); }, dur); toast.onclick=()=>{ toast.classList.add('fade-out'); setTimeout(()=>toast.remove(),300); }; },
      persistentCache: cache,

  // helpers globales
  window.getInitials = (name) => name ? name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() : '??';
  window.formatTime = (ts) => { let diff = Date.now() - ts; if(diff<60000) return 'Ahora'; if(diff<3600000) return `${Math.floor(diff/60000)} min`; if(diff<86400000) return `${Math.floor(diff/3600000)} h`; return new Date(ts).toLocaleDateString(); };
  window.toggleSideMenu = (open) => { let menu = document.getElementById('side-menu'); let overlay = document.getElementById('side-menu-overlay'); if(open===true || (menu.style.right !== '0px' && open!==false)) { menu.style.right = '0px'; overlay.style.display = 'block'; document.body.style.overflow='hidden'; } else { menu.style.right = '-350px'; overlay.style.display = 'none'; document.body.style.overflow=''; } };
  function updateSideMenuContent() { let prof = AppState.state.user.profile; let user = AppState.state.user.current; let container = document.getElementById('sideMenuProfile'); if(container && user) { container.innerHTML = `<div class="side-avatar">${user.photoURL ? `<img src="${user.photoURL}" width="55" style="border-radius:50%">` : window.getInitials(user.displayName||user.email)}</div><div class="side-info"><h4>${user.displayName || 'Sin nombre'}</h4><p>${prof?.activated ? 'Activado' : 'Pendiente'}</p></div>`; } let subastaBtn=document.getElementById('sideSubastasBtn'); if(subastaBtn) subastaBtn.style.display = prof?.ventas ? 'flex' : 'none'; let juezBtn=document.getElementById('sideJuezBtn'); if(juezBtn) juezBtn.style.display = prof?.isJudge ? 'flex' : 'none'; let adminBtn=document.getElementById('sideAdminCotejoBtn'); if(adminBtn) adminBtn.style.display = prof?.gallo ? 'flex' : 'none'; }

er="Representante/Criadero" /><select id="registerMunicipio">${opts}</select><input id="registerCustomMunicipio" placeholder="Otro municipio" style="display:none;" /><input id="registerPhone" placeholder="Teléfono 7 dígitos" /><input id="registerPassword" type="password" placeholder="Contraseña" /><input id="registerConfirmPassword" type="password" placeholder="Confirmar" /><label><input type="checkbox" id="registerTerms" /> Acepto términos</label><button id="completeRegisterBtn">REGISTRARSE</button>`; document.getElementById('registerFormContainer').innerHTML = formHtml; document.getElementById('completeRegisterBtn').onclick = () => window.handleCompleteRegister(); let munSelect = document.getElementById('registerMunicipio'); let customMun = document.getElementById('registerCustomMunicipio'); munSelect.onchange = () => { customMun.style.display = munSelect.value === 'Otro' ? 'block' : 'none'; }; }; if(document.getElementById('registerFormContainer')) window.renderRegisterForm(); };
  window.handleLogin = async () => { let email = document.getElementById('loginPhone')?.value; let pwd = document.getElementById('loginPassword')?.value; if(!email || !pwd) return AppState.addNotification("Complete campos", "warning"); try { await AppState.state.firebase.auth.signInWithEmailAndPassword(email, pwd); AppState.addNotification("Bienvenido", "success"); await loadUserProfile(AppState.state.user.current.uid); navigateTo('public'); } catch(e) { AppState.addNotification(e.message, "error"); } };

  window.checkActivationStatusWithFeedback = async () => { let uid = AppState.state.user.current?.uid; let snap = await AppState.state.firebase.database.ref(`users/${uid}/activated`).once('value'); if(snap.val() === true) { AppState.addNotification("Cuenta activada!", "success"); await loadUserProfile(uid); navigateTo('public'); } else AppState.addNotification("Aún pendiente", "warning"); };

  window.renderAdminScreen = () => { let profile = AppState.state.user.profile; if(profile?.gallo !== true) { document.getElementById('social-app').innerHTML = `<div class="screen-card">Acceso denegado</div>`; return; } document.getElementById('social-app').innerHTML = `<div class="screen-card">👑 Panel Administración (próximamente)</div>`; };
  // ---------- Firebase & Loading ----------
  async function loadUserProfile(uid) { if(!AppState.state.firebase.database) AppState.state.firebase.database = firebase.database(); let cached = AppState.persistentCache.get('profile', uid); if(cached) { AppState.setUser(AppState.state.user.current, cached); updateSideMenuContent(); return true; } let snap = await AppState.state.firebase.database.ref(`users/${uid}`).once('value'); let data = snap.val() || { activated: false }; AppState.persistentCache.set('profile', data, uid); AppState.setUser(AppState.state.user.current, data); updateSideMenuContent(); return true; }
  async function initializeFirebase() { if(AppState.state.firebase.isEnabled) return; try { firebase.initializeApp(FIREBASE_MAIN); AppState.state.firebase.auth = firebase.auth(); AppState.state.firebase.isEnabled = true; AppState.state.firebase.database = firebase.database(); firebase.auth().onAuthStateChanged(async (user) => { if(user) { AppState.setUser(user, null); await loadUserProfile(user.uid); if(AppState.state.user.profile?.activated) navigateTo('public'); else navigateTo('activation_pending'); } else { AppState.clearUser(); navigateTo('public'); } hideLoadingScreen(); }); } catch(e) { console.error(e); } }
  function hideLoadingScreen() { let ls = document.getElementById('loading-screen'); if(ls) { ls.style.opacity='0'; setTimeout(()=>{ ls.style.display='none'; document.getElementById('social-app').style.display='block'; },500); } AppState.setLoading(false); }
  function updateLoadingProgress(percent, msg) { let bar = document.getElementById('loading-progress-bar'); let status = document.getElementById('loading-status'); if(bar) bar.style.width = `${percent}%`; if(status) status.innerText = msg||''; }
  window.handleLoginClick = () => { if(!AppState.state.firebase.isEnabled) initializeFirebase(); navigateTo('login'); };
  window.handleLogout = async () => { window.toggleSideMenu(false); AppState.addNotification("Cerrando sesión...","info"); AppState.persistentCache.clearUserCache(AppState.state.user.current?.uid); localStorage.removeItem('legado_usuario_recurrente'); try { await AppState.state.firebase.auth.signOut(); } catch(e){} AppState.clearUser(); navigateTo('public'); location.reload(); };
  // google modals
  window.mostrarModalGoogleInferior = () => { if(document.getElementById('google-one-tap-container')) return; let div = document.createElement('div'); div.id='google-one-tap-container'; div.style.position='fixed'; div.style.bottom='20px'; div.style.left='0'; div.style.width='100%'; div.style.display='flex'; div.style.justifyContent='center'; div.style.zIndex='100000'; document.body.appendChild(div); google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: async (res) => { try { let cred = firebase.auth.GoogleAuthProvider.credential(res.credential); await AppState.state.firebase.auth.signInWithCredential(cred); } catch(e){ AppState.addNotification("Error Google","error"); } } }); google.accounts.id.prompt(); };
  window.mostrarModalGoogleSuperior = () => { let container = document.createElement('div'); container.id='google-one-tap-container-superior'; container.style.position='fixed'; container.style.top='120px'; container.style.left='50%'; container.style.transform='translateX(-50%)'; container.style.zIndex='100001'; document.body.appendChild(container); google.accounts.id.renderButton(container, { theme:'outline', size:'large' }); setTimeout(()=>{ container.addEventListener('click',()=>{}); window.addEventListener('click', function close(e){ if(!container.contains(e.target)){ container.remove(); window.removeEventListener('click',close); } }); },100); };
  // inicialización y eventos
  window.addEventListener('load', async () => { document.getElementById('loading-screen').style.display='flex'; updateLoadingProgress(10,'Conectando...'); await initializeFirebase(); updateLoadingProgress(80,'Verificando sesión'); setTimeout(()=>{ if(!AppState.state.user.current && !AppState.state.ui.currentScreen) navigateTo('public'); },500); window.mostrarModalGoogleInferior(); });
  window.renderScreenSkeleton = (name) => { document.getElementById('social-app').innerHTML = `<div class="skeleton-card"></div><div class="skeleton-card"></div>`; };
  // side menu listeners
  document.getElementById('sidePerfilBtn')?.addEventListener('click',()=>navigateTo('perfil'));
  document.getElementById('sideShareBtn')?.addEventListener('click',()=>navigateTo('share'));
  document.getElementById('sideSubastasBtn')?.addEventListener('click',()=>navigateTo('ventas'));
  document.getElementById('sideJuezBtn')?.addEventListener('click',()=>navigateTo('juez'));
  document.getElementById('sideConfigBtn')?.addEventListener('click',()=>navigateTo('configuraciones'));
  document.getElementById('sideLogoutBtn')?.addEventListener('click',()=>window.handleLogout());
  document.getElementById('side-menu-overlay')?.addEventListener('click',()=>window.toggleSideMenu(false));
  // Connection bar simulator
  window.addEventListener('online',()=>{ let bar=document.getElementById('connection-status-bar'); bar.style.transform='translateY(0)'; document.getElementById('connMsg').innerText='Conexión restablecida'; setTimeout(()=>{ bar.style.transform='translateY(100%)'; },5000); });
  window.addEventListener('offline',()=>{ let bar=document.getElementById('connection-status-bar'); bar.style.transform='translateY(0)'; document.getElementById('connMsg').innerText='Sin internet'; });
  // adicional functions
  window.getDeviceFingerprint = async () => "simulated_fingerprint";
  window.checkActivationStatus = window.checkActivationStatusWithFeedback;
  window.openAppInfoModal = ()=>{ AppState.addNotification("Info App - versión 2.0","info"); };
  window.openTermsModal = ()=>{ AppState.addNotification("Términos y condiciones","info"); };
  window.openPrivacyModal = ()=>{ AppState.addNotification("Política de privacidad","info"); };
  window.copyRoosterUrl = ()=>{};
  window.shareRoosterSection = ()=>{};
  window.logoutAndGoPublic = window.handleLogout;
  window.toggleUserActivation = ()=>{};
  window.toggleUserGallo = ()=>{};
  window.toggleUserJudge = ()=>{};
  window.updatePhonePrefix = ()=>{};
  window.togglePasswordVisibility = ()=>{};
  window.mostrarNotificacionYModal = ()=>{};
  window.mostrarModalInformativo = ()=>{ AppState.addNotification("Información de la App","info"); };
  // suscripción y protección final
  AppState.subscribe(()=>{ if(AppState.state.ui.currentScreen === 'login' && window.renderLoginScreen) window.renderLoginScreen(); else renderCurrentScreen(); });
  AppState.protectAppState();
  window.AppState = AppState.state;
</script>
