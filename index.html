window.AppState = (function() {
  let state = {
    firebase: { app: null, auth: null, database: null, isEnabled: false, isInitialized: false },
    user: { current: null, profile: null },
    ui: { currentScreen: 'public', pendingScreen: null, isLoading: true, isLoadingScreen: false, loadingScreenName: '', activeTab: 'login', formData: { register: {}, login: {} } },
    rooster: { cotejoState: false, listener: null, tournamentInfo: null, roosters: [] },
    persistentCache: { version: '2.0' },
    subscribers: [],
    _isNotifying: false
  };
  
  const cache = {
    set(key, data, uid) { try { if(uid) localStorage.setItem(`app_${key}_${uid}`, JSON.stringify({data, ts: Date.now(), v: '2.0'})); } catch(e){} },
    get(key, uid, maxAge=30*24*3600*1000) { try { let raw = localStorage.getItem(`app_${key}_${uid}`); if(!raw) return null; let obj = JSON.parse(raw); if(obj.v !== '2.0' || Date.now() - obj.ts > maxAge) { localStorage.removeItem(`app_${key}_${uid}`); return null; } return obj.data; } catch(e){ return null; } },
    clearUserCache(uid) { Object.keys(localStorage).forEach(k => { if(k.startsWith('app_') && k.endsWith(uid)) localStorage.removeItem(k); }); },
    setGlobal(key, data) { localStorage.setItem(`app_global_${key}`, JSON.stringify({data, ts: Date.now(), v:'2.0'})); },
    getGlobal(key, maxAge=30*24*3600*1000) { let raw = localStorage.getItem(`app_global_${key}`); if(!raw) return null; let obj=JSON.parse(raw); if(obj.v !== '2.0' || Date.now()-obj.ts > maxAge) return null; return obj.data; }
  };
  
  function notify(prop) { if(state._isNotifying) return; state._isNotifying=true; state.subscribers.forEach(cb=>cb(prop)); state._isNotifying=false; }
  
  return {
    get state() { return state; },
    setUser(userData, profileData) { state.user.current = userData; state.user.profile = profileData; notify('user'); },
    clearUser() { if(state.rooster.listener && state.firebase.database) state.rooster.listener(); state.user.current = null; state.user.profile = null; notify('user'); },
    setScreen(screen) { if(window[`${screen}Killer`] && typeof window[`${screen}Killer`]==='function') window[`${screen}Killer`](); state.ui.currentScreen = screen; localStorage.setItem('lastScreen', screen); notify('screen'); renderCurrentScreen(); },
    setLoading(loading) { state.ui.isLoading = loading; notify('loading'); },
    addNotification(msg, type='info', dur=5000) { let cont=document.getElementById('toast-container'); if(!cont) return; let toast=document.createElement('div'); toast.className=`toast ${type}`; toast.innerText=msg; cont.appendChild(toast); setTimeout(()=>{ toast.classList.add('fade-out'); setTimeout(()=>toast.remove(),300); }, dur); toast.onclick=()=>{ toast.classList.add('fade-out'); setTimeout(()=>toast.remove(),300); }; },
    persistentCache: cache,
    subscribe(fn) { state.subscribers.push(fn); },
    protectAppState() { if(state.user.profile) Object.freeze(state.user.profile); Object.preventExtensions(state); }
  };
})();

window.toggleSideMenu = (open) => { 
  let menu = document.getElementById('side-menu'); 
  let overlay = document.getElementById('side-menu-overlay'); 
  if(open===true || (menu.style.right !== '0px' && open!==false)) { 
    menu.style.right = '0px'; 
    overlay.style.display = 'block'; 
    document.body.style.overflow='hidden'; 
  } else { 
    menu.style.right = '-350px'; 
    overlay.style.display = 'none'; 
    document.body.style.overflow=''; 
  } 
};

function updateSideMenuContent() { 
  let prof = AppState.state.user.profile; 
  let user = AppState.state.user.current; 
  let container = document.getElementById('sideMenuProfile'); 
  if(container && user) { 
    container.innerHTML = `<div class="side-avatar">${user.photoURL ? `<img src="${user.photoURL}" width="55" style="border-radius:50%">` : window.getInitials(user.displayName||user.email)}</div><div class="side-info"><h4>${user.displayName || 'Sin nombre'}</h4><p>${prof?.activated ? 'Activado' : 'Pendiente'}</p></div>`; 
  } 
  let subastaBtn=document.getElementById('sideSubastasBtn'); 
  if(subastaBtn) subastaBtn.style.display = prof?.ventas ? 'flex' : 'none'; 
  let juezBtn=document.getElementById('sideJuezBtn'); 
  if(juezBtn) juezBtn.style.display = prof?.isJudge ? 'flex' : 'none'; 
  let adminBtn=document.getElementById('sideAdminCotejoBtn'); 
  if(adminBtn) adminBtn.style.display = prof?.gallo ? 'flex' : 'none'; 
}

  if(navigator.userAgent.includes('Googlebot')) return; 
  window.toggleSideMenu(false); 
  if(section!=='login' && section!=='activation_pending') localStorage.setItem('lastScreen', section); 
  AppState.setScreen(section); 
};

function renderCurrentScreen() { 
  let scr = AppState.state.ui.currentScreen; 
  if(window[`render${scr.charAt(0).toUpperCase()+scr.slice(1)}Screen`])

    document.getElementById('social-app').innerHTML = '<div class="screen-card">Error 404</div>'; 
}

async function loadUserProfile(uid) { 
  if(!AppState.state.firebase.database) AppState.state.firebase.database = firebase.database(); 
  let cached = AppState.persistentCache.get('profile', uid); 
  if(cached) { 
    AppState.setUser(AppState.state.user.current, cached); 
    updateSideMenuContent(); 
    return true; 
  } 
  let snap = await AppState.state.firebase.database.ref(`users/${uid}`).once('value'); 
  let data = snap.val() || { activated: false, gallo: false, isJudge: false, publicaciones: false, ventas: false, pedigri: false }; 
  AppState.persistentCache.set('profile', data, uid); 
  AppState.setUser(AppState.state.user.current, data); 
  updateSideMenuContent(); 
  return true; 
}

// FUNCIÓN INICIALIZAR FIREBASE - CORREGIDA
async function initializeFirebase() { 
  if(AppState.state.firebase.isEnabled) return true;
  
  // ESPERAR A QUE FIREBASE EXISTA
  let esperas = 0;
  while(typeof firebase === 'undefined' && esperas < 20) {
    await new Promise(r => setTimeout(r, 200));
    esperas++;
  }
  
  if(typeof firebase === 'undefined') {
    AppState.addNotification("Error: Firebase no cargó, recargue la página", "error");
    return false;
  }
  
  try { 
    if(!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_MAIN); 
    }
    AppState.state.firebase.auth = firebase.auth(); 
    AppState.state.firebase.database = firebase.database(); 
    AppState.state.firebase.isEnabled = true; 
    AppState.state.firebase.isInitialized = true;
    
    firebase.auth().onAuthStateChanged(async (user) => { 
      if(user) { 
        AppState.setUser(user, null); 
        await loadUserProfile(user.uid); 
        if(AppState.state.user.profile?.activated) navigateTo('public'); 
        else navigateTo('activation_pending'); 
      } else { 
        AppState.clearUser(); 
        if(AppState.state.ui.currentScreen !== 'login' && AppState.state.ui.currentScreen !== 'public') 
          navigateTo('public'); 
      } 
      hideLoadingScreen(); 
    }); 
    return true;
  } catch(e) { 
    console.error(e); 
    AppState.addNotification("Error de conexión: " + e.message, "error");
    return false;
  } 
}

function hideLoadingScreen() { 
  let ls = document.getElementById('loading-screen'); 
  if(ls) { 
    ls.style.opacity='0'; 
    setTimeout(()=>{ 
      ls.style.display='none'; 
      document.getElementById('social-app').style.display='block'; 
    },500); 
  } 
  AppState.setLoading(false); 
}

function updateLoadingProgress(percent, msg) { 
  let bar = document.getElementById('loading-progress-bar'); 
  let status = document.getElementById('loading-status'); 
  if(bar) bar.style.width = `${percent}%`; 
  if(status) status.innerText = msg||''; 
}

window.handleLoginClick = async () => { 
  if(!AppState.state.firebase.isEnabled) {
    await initializeFirebase(); 
  }
  navigateTo('login'); 
};

window.handleLogin = async () => { 
  let email = document.getElementById('loginPhone')?.value; 
  let pwd = document.getElementById('loginPassword')?.value; 
  if(!email || !pwd) return AppState.addNotification("Complete campos", "warning"); 
  if(!AppState.state.firebase.auth) {
    await initializeFirebase();
  }
  try { 
    await AppState.state.firebase.auth.signInWithEmailAndPassword(email, pwd); 
    AppState.addNotification("Bienvenido", "success"); 
  } catch(e) { 
    AppState.addNotification(e.message, "error"); 
  } 
};

window.resetPassword = async () => { 
  let email = document.getElementById('loginPhone')?.value; 
  if(!email) return AppState.addNotification("Ingrese email", "warning"); 
  if(!AppState.state.firebase.auth) await initializeFirebase();
  try { 
    await AppState.state.firebase.auth.sendPasswordResetEmail(email); 
    AppState.addNotification("Correo enviado", "info"); 
  } catch(e) { 
    AppState.addNotification(e.message, "error"); 
  } 
};

window.handleCompleteRegister = async () => { 
  let email = document.getElementById('registerRealEmail')?.value; 
  let pwd = document.getElementById('registerPassword')?.value; 
  let confirm = document.getElementById('registerConfirmPassword')?.value; 
  let fullName = document.getElementById('registerFullName')?.value;
  let phone = document.getElementById('registerPhone')?.value;
  let terms = document.getElementById('registerTerms')?.checked;
  
  if(!fullName) return AppState.addNotification("Nombre completo requerido", "warning");
  if(!email) return AppState.addNotification("Email requerido", "warning");
  if(pwd !== confirm) return AppState.addNotification("Contraseñas no coinciden","error"); 
  if(pwd.length < 6) return AppState.addNotification("Contraseña mínima 6 caracteres","warning");
  if(!terms) return AppState.addNotification("Debes aceptar los términos","warning");
  if(!AppState.state.firebase.auth) await initializeFirebase();
  
  try { 
    let cred = await AppState.state.firebase.auth.createUserWithEmailAndPassword(email, pwd); 
    await cred.user.updateProfile({displayName: fullName}); 
    let municipio = document.getElementById('registerMunicipio')?.value;
    if(municipio === 'Otro') municipio = document.getElementById('registerCustomMunicipio')?.value;
    let newProfile = { 
      activated: false, gallo: false, isJudge: false, publicaciones: false, ventas: false, pedigri: false,
      displayName: fullName, realEmail: email, phone: phone || '', municipio: municipio || '',
      partyName: document.getElementById('registerPartyName')?.value || '',
      representative: document.getElementById('registerRepresentative')?.value || '',
      registeredAt: Date.now(), registeredWith: 'email'
    }; 
    await AppState.state.firebase.database.ref(`users/${cred.user.uid}`).set(newProfile); 
    AppState.addNotification("Registro exitoso, espera activación","success"); 
    navigateTo('activation_pending'); 
  } catch(e) { 
    AppState.addNotification(e.message,"error"); 
  } 
};

window.handleLogout = async () => { 
  window.toggleSideMenu(false); 
  AppState.addNotification("Cerrando sesión...","info"); 
  AppState.persistentCache.clearUserCache(AppState.state.user.current?.uid); 
  localStorage.removeItem('legado_usuario_recurrente');
  localStorage.removeItem('lastScreen');
  try { 
    if(AppState.state.firebase.auth) await AppState.state.firebase.auth.signOut(); 
  } catch(e){} 
  AppState.clearUser(); 
  navigateTo('public'); 
};

window.checkActivationStatusWithFeedback = async () => { 
  let uid = AppState.state.user.current?.uid; 
  if(!uid) return;
  if(!AppState.state.firebase.database) await initializeFirebase();
  let snap = await AppState.state.firebase.database.ref(`users/${uid}/activated`).once('value'); 
  if(snap.val() === true) { 
    AppState.addNotification("Cuenta activada!", "success"); 
    await loadUserProfile(uid); 
    navigateTo('public'); 
  } else { 
    AppState.addNotification("Aún pendiente de activación", "warning");
    setTimeout(() => {
      if(confirm("¿Solicitar activación al administrador?")) {
        window.open("https://wa.me/5219611150394?text=Hola,%20solicito%20activaci%C3%B3n%20de%20mi%20cuenta:%20" + encodeURIComponent(AppState.state.user.current?.email || ""), "_blank");
      }
    }, 500);
  } 
};

window.mostrarModalGoogleInferior = () => { 
  setTimeout(() => {
    if(typeof google === 'undefined' || !google.accounts) return;
    if(document.getElementById('google-one-tap-container')) return;
    let div = document.createElement('div'); 
    div.id='google-one-tap-container'; 
    div.style.position='fixed'; 
    div.style.bottom='20px'; 
    div.style.left='0'; 
    div.style.width='100%'; 
    div.style.display='flex'; 
    div.style.justifyContent='center'; 
    div.style.zIndex='100000'; 
    document.body.appendChild(div); 
    google.accounts.id.initialize({ 
      client_id: GOOGLE_CLIENT_ID, 
      callback: async (res) => { 
        try { 
          await initializeFirebase();
          let cred = firebase.auth.GoogleAuthProvider.credential(res.credential); 
          await AppState.state.firebase.auth.signInWithCredential(cred); 
          document.getElementById('google-one-tap-container')?.remove();
        } catch(e){ 
          AppState.addNotification("Error Google: " + e.message,"error"); 
        } 
      } 
    }); 
    google.accounts.id.prompt(); 
  }, 1000);
};

window.mostrarModalGoogleSuperior = () => { 
  if(typeof google === 'undefined' || !google.accounts) {
    AppState.addNotification("Cargando Google, intente de nuevo", "warning");
    return;
  }
  let container = document.createElement('div'); 
  container.id='google-one-tap-container-superior'; 
  container.style.position='fixed'; 
  container.style.top='120px'; 
  container.style.left='50%'; 
  container.style.transform='translateX(-50%)'; 
  container.style.zIndex='100001'; 
  container.style.background='#2c211b';
  container.style.padding='20px';
  container.style.borderRadius='20px';
  container.style.boxShadow='0 0 20px rgba(0,0,0,0.5)';
  document.body.appendChild(container); 
  google.accounts.id.renderButton(container, { theme:'outline', size:'large' }); 
  setTimeout(()=>{ 
    window.addEventListener('click', function close(e){ 
      if(!container.contains(e.target)){ container.remove(); window.removeEventListener('click',close); } 
    }); 
  },100); 
};
