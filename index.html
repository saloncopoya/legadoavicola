    <style>
        /* RESET COMPLETO - SIN MÁRGENES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            overflow-x: hidden;
            padding-top: 56px;
            padding-bottom: 56px;
        }

        /* Variables CSS */
        :root {
            --primary: #1877f2;
            --primary-dark: #0c63d4;
            --secondary: #42b72a;
            --danger: #e41e3f;
            --warning: #f7b928;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
        }

        /* Header Superior - Glassmorphism */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .icon-btn:hover {
            background: #e4e6e9;
        }

        /* Status Indicator */
        .connection-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;

            transition: all 0.3s;

        .connection-status.offline {
            background: #ef4444;
            box-shadow: 0 0 0 2px rgba(239,68,68,0.3);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 0;
            transition: all 0.2s;
            color: var(--gray);
            font-size: 12px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item span:first-child {
            font-size: 22px;
        }

        /* Main Content */
        .main-content {
            min-height: calc(100vh - 112px);
            padding: 16px;
        }

        /* Cards estilo Facebook */
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Formularios */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24,119,242,0.1);
        }

        /* Botones */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Tablas responsivas */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--light);
            font-weight: 600;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-warning {
            background: #fef9c3;
            color: #854d0e;
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 72px;
            left: 16px;
            right: 16px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: #1e293b;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Desktop adjustments */
        @media (min-width: 768px) {
            body {
                padding-bottom: 0;

        /* Loading spinner */

        }

        /* Grid responsivo */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));

<script>
    // ============================================
    // 1. CONFIGURACIÓN INICIAL Y SEGURIDAD
    // ============================================
    
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyASox7mRak5V0py29htEVWCVeipGpA0yfs",
        authDomain: "galloslivebadge.firebaseapp.com",
        databaseURL: "https://galloslivebadge-default-rtdb.firebaseio.com",
        projectId: "galloslivebadge",
        storageBucket: "galloslivebadge.firebasestorage.app",
        messagingSenderId: "979482928760",
        appId: "1:979482928760:web:3ea879dc4ee1e020df6f8d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    
    // Estado global
    let currentUser = null;
    let isOnline = navigator.onLine;
    let currentRoute = '/';
    let db = null;
    
    // Anti-debugging / Protección consola
    (function antiDebug() {
        // Detectar DevTools
        setInterval(() => {
            const before = new Date();
            debugger;
            const after = new Date();
            if (after - before > 100) {
                document.body.innerHTML = '<div style="padding:20px;text-align:center"><h1>⚠️ DevTools Detectado</h1><p>Por favor cierra las herramientas de desarrollo</p></div>';
            }
        }, 1000);
        
        // Bloquear eval y Function
        const originalEval = window.eval;
        window.eval = function() { throw new Error('Eval bloqueado por seguridad'); };
        
        // Limpiar console.log en producción (opcional)
        if (window.location.hostname !== 'localhost') {
            console.log = function() {};
            console.info = function() {};
        }
    })();
    
    // Sanitización de inputs
    function sanitizeInput(input) {
        if (typeof input !== 'string') return input;
        return DOMPurify.sanitize(input, {
            ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'p', 'br'],
            ALLOWED_ATTR: ['class']
        });
    }
    
    // Validación de email
    function validateEmail(email) {
        const re = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        return re.test(email);
    }
    
    // Validación de password
    function validatePassword(password) {
        return password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password);
    }
    
    // ============================================
    // 2. INDEXEDDB - ALMACENAMIENTO OFFLINE
    // ============================================
    
    function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open('GallosLiveDB', 4); // Cambia versión a 4
        
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
            db = request.result;
            resolve(db);
        };
        
        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            
            if (!db.objectStoreNames.contains('offlineTorneos')) {
                const store = db.createObjectStore('offlineTorneos', { keyPath: 'id', autoIncrement: true });
                store.createIndex('userId', 'userId', { unique: false });
                store.createIndex('syncStatus', 'syncStatus', { unique: false });
            }
            
            if (!db.objectStoreNames.contains('pendingOps')) {
                const pendingStore = db.createObjectStore('pendingOps', { keyPath: 'id', autoIncrement: true });
                pendingStore.createIndex('userId', 'userId', { unique: false });
                pendingStore.createIndex('timestamp', 'timestamp', { unique: false });
            }
            
            if (!db.objectStoreNames.contains('users')) {
                db.createObjectStore('users', { keyPath: 'uid' });
            }
            
            // 👇 AGREGA ESTE NUEVO STORE 👇
            if (!db.objectStoreNames.contains('savedTables')) {
                db.createObjectStore('savedTables', { keyPath: 'id', autoIncrement: true });
            }
        };
    });
}
    
    async function saveToDB(store, data) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction([store], 'readwrite');
            const request = tx.objectStore(store).put(data);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function getFromDB(store, key = null) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction([store], 'readonly');
            let request;
            if (key) {
                request = tx.objectStore(store).get(key);
            } else {
                request = tx.objectStore(store).getAll();
            }
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    // ============================================
    // 3. SISTEMA DE SINCRONIZACIÓN
    // ============================================
    
    async function syncPendingOperations() {
        if (!isOnline || !currentUser) return;
        
        const pendingOps = await getFromDB('pendingOps');
        const userOps = pendingOps.filter(op => op.userId === currentUser.uid);
        
        if (userOps.length === 0) return;
        
        showToast(`🔄 Sincronizando ${userOps.length} elementos...`, 'info');
        
        for (const op of userOps) {
            try {
                if (op.type === 'CREATE_TORNEO') {
                    const torneoRef = database.ref(`torneos/${currentUser.uid}/${op.data.offlineId}`);
                    await torneoRef.set(op.data);
                }
                
                // Actualizar estado local
                const tx = db.transaction(['pendingOps'], 'readwrite');
                tx.objectStore('pendingOps').delete(op.id);
                
                // Actualizar torneo local como sincronizado
                const allTorneos = await getFromDB('offlineTorneos');
                const torneoToUpdate = allTorneos.find(t => t.offlineId === op.data.offlineId);
                if (torneoToUpdate) {
                    torneoToUpdate.syncStatus = 'synced';
                    await saveToDB('offlineTorneos', torneoToUpdate);
                }
            } catch (error) {
                console.error('Error sync:', error);
            }
        }
        
        showToast('✅ Sincronización completada', 'success');
        if (currentRoute === '/mis-torneos') renderMisTorneos();
    }
    
    // ============================================
    // 4. FUNCIONES DE AUTENTICACIÓN
    // ============================================
    
    async function handleLogin(email, password) {
        if (!validateEmail(email)) throw new Error('Email inválido');
        if (!validatePassword(password)) throw new Error('Password debe tener 8+ caracteres, una mayúscula y un número');
        
        const result = await auth.signInWithEmailAndPassword(email, password);
        currentUser = result.user;
        
        await saveToDB('users', {
            uid: currentUser.uid,
            email: currentUser.email,
            displayName: currentUser.displayName
        });
        
        updateUIForAuth();
        await syncPendingOperations();
        navigateTo('/dashboard');
        showToast('✅ Bienvenido ' + (currentUser.displayName || currentUser.email), 'success');
    }
    
    async function handleRegister(email, password, nombre) {
        if (!validateEmail(email)) throw new Error('Email inválido');
        if (!validatePassword(password)) throw new Error('Password inválido');
        if (!nombre || nombre.length < 2) throw new Error('Nombre inválido');
        
        const sanitizedName = sanitizeInput(nombre);
        const result = await auth.createUserWithEmailAndPassword(email, password);
        await result.user.updateProfile({ displayName: sanitizedName });
        currentUser = result.user;
        
        updateUIForAuth();
        navigateTo('/dashboard');
        showToast('✅ Registro exitoso', 'success');
    }
    
    async function logout() {
        await auth.signOut();
        currentUser = null;
        updateUIForAuth();
        navigateTo('/');
        showToast('Sesión cerrada', 'info');
    }
    
    function updateUIForAuth() {
    const isLoggedIn = !!currentUser;
    
    // Agrega #tablasNav a la lista
    document.querySelectorAll('#protectedNav, #torneosNav, #perfilNav, #tablasNav, #tablasNavBottom').forEach(el => {
        if (el) el.style.display = isLoggedIn ? 'flex' : 'none';
    });
    
    const loginNav = document.getElementById('loginNav');
    if (loginNav) loginNav.style.display = isLoggedIn ? 'none' : 'flex';
    
    if (isLoggedIn && (currentRoute === '/login' || currentRoute === '/register')) {
        navigateTo('/dashboard');
    }
}
    
    // ============================================
    // 5. GESTIÓN DE TORNEOS (OFFLINE-FIRST)
    // ============================================
    
    async function saveTorneoOffline(torneoData) {
        const torneo = {
            ...torneoData,
            userId: currentUser.uid,
            syncStatus: isOnline ? 'synced' : 'pending',
            timestamp: new Date().toISOString(),
            offlineId: Date.now()
        };
        
        await saveToDB('offlineTorneos', torneo);
        
        if (!isOnline) {
            await saveToDB('pendingOps', {
                userId: currentUser.uid,
                type: 'CREATE_TORNEO',
                data: torneo,
                timestamp: new Date().toISOString()
            });
            showToast('📡 Guardado localmente (Offline)', 'info');
        } else {
            const torneoRef = database.ref(`torneos/${currentUser.uid}/${torneo.offlineId}`);
            await torneoRef.set(torneo);
            showToast('✅ Torneo guardado en la nube', 'success');
        }
        
        renderMisTorneos();
    }
    
    async function getTorneos() {
        if (isOnline && currentUser) {
            try {
                const snapshot = await database.ref(`torneos/${currentUser.uid}`).once('value');
                const firebaseTorneos = snapshot.val() || {};
                const torneosList = Object.keys(firebaseTorneos).map(key => ({
                    id: key,
                    ...firebaseTorneos[key]
                }));
                
                for (const t of torneosList) {
                    await saveToDB('offlineTorneos', { ...t, syncStatus: 'synced' });
                }
                return torneosList;
            } catch (e) {
                console.log('Error fetching from Firebase, usando local');
            }
        }
        
        const localTorneos = await getFromDB('offlineTorneos');
        return localTorneos.filter(t => t.userId === currentUser?.uid);
    }
    
    // ============================================
    // 6. RENDERIZADO DE PÁGINAS CON META TAGS DINÁMICOS
    // ============================================
    
    const pages = {
        '/': {
            title: 'GallosLive - Gestión de Torneos',
            description: 'Plataforma profesional para gestión de torneos con soporte offline',
            ogImage: 'og-home.jpg',

        '/galeria': {

        },
        '/blog': {

        },
        '/dashboard': {

            requiresAuth: true,
            render: renderDashboard
        },
        '/mis-torneos': {
            title: 'Mis Torneos - GallosLive',

        '/inscripciones': {

    function updateMetaTags(pageKey) {
        const page = pages[pageKey] || pages['/'];
        document.title = page.title;
        
        // Crear o actualizar meta tags OG
        let ogTitle = document.querySelector('meta[property="og:title"]');
        let ogDesc = document.querySelector('meta[property="og:description"]');
        let ogImage = document.querySelector('meta[property="og:image"]');
        let ogUrl = document.querySelector('meta[property="og:url"]');
        
        if (!ogTitle) {
            ogTitle = document.createElement('meta');
            ogTitle.setAttribute('property', 'og:title');
            document.head.appendChild(ogTitle);
        }
        if (!ogDesc) {
            ogDesc = document.createElement('meta');
            ogDesc.setAttribute('property', 'og:description');
            document.head.appendChild(ogDesc);
        }
        if (!ogImage) {
            ogImage = document.createElement('meta');
            ogImage.setAttribute('property', 'og:image');
            document.head.appendChild(ogImage);
        }
        if (!ogUrl) {
            ogUrl = document.createElement('meta');
            ogUrl.setAttribute('property', 'og:url');
            document.head.appendChild(ogUrl);
        }
        
        ogTitle.setAttribute('content', page.title);
        ogDesc.setAttribute('content', page.description);
        ogUrl.setAttribute('content', window.location.href);
        
        // Generar imagen dinámica según la página
        const imageDataUrl = generatePageImage(pageKey, page.title);
        ogImage.setAttribute('content', imageDataUrl);
    }
    
    // Función para generar imagen según la página
    function generatePageImage(route, title) {
        const canvas = document.createElement('canvas');
        canvas.width = 1200;
        canvas.height = 630;
        const ctx = canvas.getContext('2d');
        
        // Fondo con gradiente
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#1877f2');
        gradient.addColorStop(1, '#8b5cf6');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Texto principal
        ctx.fillStyle = 'white';
        ctx.font = 'bold 55px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center';
        let displayTitle = title.length > 45 ? title.substring(0, 42) + '...' : title;
        ctx.fillText(displayTitle, canvas.width/2, canvas.height/2 - 40);
        
        // Subtítulo
        ctx.font = '35px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText('GallosLive', canvas.width/2, canvas.height/2 + 70);
        
        // Emoji según la ruta
        let emoji = '🐓';
        if (route === '/torneos-publicos' || route === '/mis-torneos') emoji = '🏆';
        if (route === '/dashboard') emoji = '📊';
        if (route === '/perfil') emoji = '👤';
        if (route === '/tablas-datos') emoji = '📋';
        if (route === '/login') emoji = '🔐';
        if (route === '/register') emoji = '📝';
        
        ctx.font = '100px "Segoe UI Emoji"';
        ctx.fillText(emoji, canvas.width/2, canvas.height - 120);
        
        return canvas.toDataURL('image/png');
    }
    async function navigateTo(route) {
        const page = pages[route];
        if (!page) {
            navigateTo('/');
            return;
        }
        
        if (page.requiresAuth && !currentUser) {
            navigateTo('/login');
            showToast('🔒 Necesitas iniciar sesión', 'warning');
            return;
        }
        
        currentRoute = route;
        updateMetaTags(route);  // Esta línea actualiza título e imagen
        
        const content = document.getElementById('mainContent');
        content.innerHTML = '<div class="spinner"></div>';
        
        await page.render(content);
        
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.dataset.route === route) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        
        window.history.pushState({}, '', route);
    }

                    <table class="data-table" id="dynamicTable">
                        <thead id="tableHeader"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                
                <!-- Acciones de la tabla -->
                <div class="table-actions">
                    <button class="btn btn-primary" id="saveTableBtn">💾 Guardar Tabla</button>
                    <button class="btn btn-secondary" id="exportCSVBtn">📥 Exportar CSV</button>
                    <button class="btn" id="clearTableBtn">🗑️ Limpiar Tabla</button>
                </div>
                
                <!-- Importar/Exportar -->
                <div class="import-export">
                    <h3>📋 Importar/Exportar Datos</h3>
                    <textarea id="csvData" rows="4" placeholder="Pega datos CSV aquí...&#10;Nombre,Email,Telefono&#10;Juan,juan@email.com,123456789&#10;Maria,maria@email.com,987654321"></textarea>
                    <div style="margin-top: 12px;">
                        <button class="btn btn-primary" id="importCSVBtn">📤 Importar CSV</button>
                        <button class="btn" id="copyTableBtn">📋 Copiar Tabla</button>
                    </div>
                </div>
                
                <!-- Tablas guardadas -->
                <div class="saved-tables-list" id="savedTablesList">
                    <h3>💾 Tablas Guardadas</h3>
                    <div id="tablesListContainer">Cargando...</div>
                </div>
            </div>
        `;
        
        // Estado de la tabla actual
        let currentTableData = {
            headers: [],
            rows: [],
            id: null
        };
        
        // Cargar tablas guardadas
        async function loadSavedTables() {
            const savedTables = await getFromDB('savedTables') || [];
            const container = document.getElementById('tablesListContainer');
            if (savedTables.length === 0) {
                container.innerHTML = '<p style="color: var(--gray);">No hay tablas guardadas aún</p>';
                return;
            }
            
            container.innerHTML = savedTables.map((table, idx) => `
                <div class="saved-table-item">
                    <div>
                        <strong>${escapeHtml(table.name || `Tabla ${idx + 1}`)}</strong>
                        <small style="color: var(--gray);">${table.headers.length} cols × ${table.rows.length} filas</small>
                    </div>
                    <div>
                        <button class="btn-icon" onclick="window.loadTableData(${idx})">📂 Cargar</button>
                        <button class="btn-icon btn-danger" onclick="window.deleteTableData(${idx})">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            // Exponer funciones globales para los botones dinámicos
            window.loadTableData = async (index) => {
                const tables = await getFromDB('savedTables');
                if (tables[index]) {
                    currentTableData = tables[index];
                    renderTable();
                    showToast('✅ Tabla cargada correctamente', 'success');
                }
            };
            
            window.deleteTableData = async (index) => {
                if (confirm('¿Eliminar esta tabla?')) {
                    const tables = await getFromDB('savedTables');
                    tables.splice(index, 1);
                    await saveToDB('savedTables', tables);
                    loadSavedTables();
                    showToast('🗑️ Tabla eliminada', 'info');
                }
            };
        }
        
        // Renderizar tabla
        function renderTable() {
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            
            if (!currentTableData.headers.length) {
                thead.innerHTML = '';
                tbody.innerHTML = '';
                return;
            }
            
            // Renderizar headers con botones de eliminar
            thead.innerHTML = `
                <tr>
                    ${currentTableData.headers.map((header, colIdx) => `
                        <th>
                            <input type="text" value="${escapeHtml(header)}" 
                                   onchange="window.updateHeader(${colIdx}, this.value)"
                                   style="background: transparent; color: white; border: none; font-weight: bold;">
                            <button onclick="window.deleteColumn(${colIdx})" style="background: rgba(255,0,0,0.3); color: white;">✖</button>
                        </th>
                    `).join('')}
                    <th style="background: var(--secondary);">
                        <button onclick="window.addNewColumn()" style="background: white; color: black;">+ Col</button>
                    </th>
                </tr>
            `;
            
            // Renderizar filas
            tbody.innerHTML = currentTableData.rows.map((row, rowIdx) => `
                <tr>
                    ${currentTableData.headers.map((_, colIdx) => `
                        <td>
                            <input type="text" value="${escapeHtml(row[colIdx] || '')}" 
                                   onchange="window.updateCell(${rowIdx}, ${colIdx}, this.value)">
                        </td>
                    `).join('')}
                    <td style="text-align: center; background: #f8fafc;">
                        <button onclick="window.deleteRow(${rowIdx})" style="background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px;">✖</button>
                    </td>
                </tr>
            `).join('');
            
            // Botón para añadir fila al final
            tbody.innerHTML += `
                <tr style="background: #f8fafc;">
                    <td colspan="${currentTableData.headers.length + 1}" style="text-align: center;">
                        <button onclick="window.addNewRow()" style="background: var(--secondary); color: white; padding: 8px; border: none; border-radius: 4px;">➕ Añadir Fila</button>
                    </td>
                </tr>
            `;
        }
        
        // Funciones de manipulación de datos
        window.updateCell = (rowIdx, colIdx, value) => {
            if (!currentTableData.rows[rowIdx]) currentTableData.rows[rowIdx] = [];
            currentTableData.rows[rowIdx][colIdx] = value;
        };
        
        window.updateHeader = (colIdx, value) => {
            currentTableData.headers[colIdx] = value;
            renderTable();
        };
        
        window.deleteColumn = (colIdx) => {
            if (confirm('¿Eliminar esta columna?')) {
                currentTableData.headers.splice(colIdx, 1);
                currentTableData.rows = currentTableData.rows.map(row => {
                    row.splice(colIdx, 1);
                    return row;
                });
                renderTable();
                showToast('🗑️ Columna eliminada', 'info');
            }
        };
        
        window.deleteRow = (rowIdx) => {
            if (confirm('¿Eliminar esta fila?')) {
                currentTableData.rows.splice(rowIdx, 1);
                renderTable();
                showToast('🗑️ Fila eliminada', 'info');
            }
        };
        
        window.addNewRow = () => {
            const newRow = new Array(currentTableData.headers.length).fill('');
            currentTableData.rows.push(newRow);
            renderTable();
            showToast('➕ Nueva fila añadida', 'success');
        };
        
        window.addNewColumn = () => {
            const newColName = prompt('Nombre de la nueva columna:', `Columna ${currentTableData.headers.length + 1}`);
            if (newColName) {
                currentTableData.headers.push(newColName);
                currentTableData.rows = currentTableData.rows.map(row => {
                    row.push('');
                    return row;
                });
                renderTable();
                showToast('➕ Nueva columna añadida', 'success');
            }
        };
        
        // Crear tabla desde dimensiones
        document.getElementById('createTableBtn').addEventListener('click', () => {
            const cols = parseInt(document.getElementById('colsCount').value);
            const rows = parseInt(document.getElementById('rowsCount').value);
            
            if (cols < 1 || cols > 20 || rows < 1 || rows > 50) {
                showToast('❌ Columnas: 1-20, Filas: 1-50', 'error');
                return;
            }
            
            currentTableData = {
                headers: Array.from({ length: cols }, (_, i) => `Columna ${i + 1}`),
                rows: Array.from({ length: rows }, () => Array(cols).fill('')),
                id: Date.now()
            };
            renderTable();
            showToast(`✅ Tabla ${cols}x${rows} creada`, 'success');
        });
        
        // Añadir fila
        document.getElementById('addRowBtn').addEventListener('click', () => {
            if (!currentTableData.headers.length) {
                showToast('❌ Crea una tabla primero', 'error');
                return;
            }
            currentTableData.rows.push(new Array(currentTableData.headers.length).fill(''));
            renderTable();
            showToast('➕ Fila añadida', 'success');
        });
        
        // Añadir columna
        document.getElementById('addColBtn').addEventListener('click', () => {
            if (!currentTableData.headers.length) {
                showToast('❌ Crea una tabla primero', 'error');
                return;
            }
            const newColName = prompt('Nombre de la nueva columna:', `Columna ${currentTableData.headers.length + 1}`);
            if (newColName) {
                currentTableData.headers.push(newColName);
                currentTableData.rows = currentTableData.rows.map(row => {
                    row.push('');
                    return row;
                });
                renderTable();
                showToast('➕ Columna añadida', 'success');
            }
        });
        
        // Guardar tabla
        document.getElementById('saveTableBtn').addEventListener('click', async () => {
            if (!currentTableData.headers.length) {
                showToast('❌ No hay tabla para guardar', 'error');
                return;
            }
            
            const tableName = prompt('Nombre para esta tabla:', `Tabla ${new Date().toLocaleString()}`);
            if (!tableName) return;
            
            const savedTables = await getFromDB('savedTables') || [];
            const tableToSave = {
                ...currentTableData,
                name: tableName,
                savedAt: new Date().toISOString()
            };
            
            if (currentTableData.id) {
                const index = savedTables.findIndex(t => t.id === currentTableData.id);
                if (index !== -1) {
                    savedTables[index] = tableToSave;
                } else {
                    savedTables.push(tableToSave);
                }
            } else {
                tableToSave.id = Date.now();
                savedTables.push(tableToSave);
            }
            
            await saveToDB('savedTables', savedTables);
            currentTableData.id = tableToSave.id;
            loadSavedTables();
            showToast('💾 Tabla guardada correctamente', 'success');
        });
        
        // Exportar CSV
        document.getElementById('exportCSVBtn').addEventListener('click', () => {
            if (!currentTableData.headers.length) {
                showToast('❌ No hay datos para exportar', 'error');
                return;
            }
            
            const csvRows = [];
            csvRows.push(currentTableData.headers.join(','));
            currentTableData.rows.forEach(row => {
                csvRows.push(row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','));
            });
            
            const csvContent = csvRows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `tabla_${Date.now()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('📥 CSV exportado', 'success');
        });
        
        // Importar CSV
        document.getElementById('importCSVBtn').addEventListener('click', () => {
            const csvText = document.getElementById('csvData').value;
            if (!csvText.trim()) {
                showToast('❌ Pega datos CSV primero', 'error');
                return;
            }
            
            try {
                const lines = csvText.trim().split('\n');
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                const rows = lines.slice(1).map(line => {
                    const regex = /(".*?"|[^,]+)(?=\s*,|\s*$)/g;
                    let matches = [];
                    let match;
                    while ((match = regex.exec(line)) !== null) {
                        matches.push(match[0].replace(/^"|"$/g, ''));
                    }
                    return matches;
                });
                
                currentTableData = {
                    headers: headers,
                    rows: rows,
                    id: Date.now()
                };
                renderTable();
                showToast(`📤 Importado: ${headers.length} columnas, ${rows.length} filas`, 'success');
            } catch (error) {
                showToast('❌ Error al importar CSV', 'error');
            }
        });
        
        // Copiar tabla
        document.getElementById('copyTableBtn').addEventListener('click', () => {
            if (!currentTableData.headers.length) {
                showToast('❌ No hay tabla para copiar', 'error');
                return;
            }
            
            let textToCopy = currentTableData.headers.join('\t') + '\n';
            currentTableData.rows.forEach(row => {
                textToCopy += row.join('\t') + '\n';
            });
            
            navigator.clipboard.writeText(textToCopy);
            showToast('📋 Tabla copiada al portapapeles', 'success');
        });
        
        // Limpiar tabla
        document.getElementById('clearTableBtn').addEventListener('click', () => {
            if (confirm('¿Limpiar la tabla actual? Los cambios no guardados se perderán.')) {
                currentTableData = { headers: [], rows: [], id: null };
                renderTable();
                showToast('🧹 Tabla limpiada', 'info');
            }
        });
        
        // Función auxiliar escapeHtml
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Inicializar
        loadSavedTables();
    }
    
    function renderLogin(container) {
        container.innerHTML = `
            <div class="card">
                <h2>🔐 Iniciar Sesión</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                    <button type="button" class="btn" id="goToRegisterBtn" style="margin-left:12px">Registrarse</button>
                </form>
            </div>
        `;
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await handleLogin(email, password);
            } catch (err) {
                showToast('❌ ' + err.message, 'error');
            }
        });
        
        document.getElementById('goToRegisterBtn').addEventListener('click', () => navigateTo('/register'));
    }
    
    function renderRegister(container) {
        container.innerHTML = `
            <div class="card">
                <h2>📝 Registrarse</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="registerNombre" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña (mín 8 chars, 1 mayúscula, 1 número)</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Registrarse</button>
                    <button type="button" class="btn" id="goToLoginBtn" style="margin-left:12px">Ya tengo cuenta</button>
                </form>
            </div>
        `;
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = sanitizeInput(document.getElementById('registerNombre').value);
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            try {
                await handleRegister(email, password, nombre);
            } catch (err) {
                showToast('❌ ' + err.message, 'error');
            }
        });
        
        document.getElementById('goToLoginBtn').addEventListener('click', () => navigateTo('/login'));
    }
    
    // ============================================
    // 8. UTILIDADES Y EVENTOS GLOBALES
    // ============================================
    
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function updateConnectionStatus() {
        isOnline = navigator.onLine;
        const statusDot = document.getElementById('connectionStatus');
        if (statusDot) {
            if (isOnline) {
                statusDot.classList.remove('offline');
                showToast('🟢 Conexión restablecida', 'success');
                if (currentUser) syncPendingOperations();
            } else {
                statusDot.classList.add('offline');
                showToast('🔴 Sin conexión - Modo offline activo', 'warning');
            }
        }
    }
    
    // Theme toggle
    let isDark = false;
    document.getElementById('themeToggle')?.addEventListener('click', () => {
        isDark = !isDark;
        document.body.style.background = isDark ? '#1a1a2e' : '#f0f2f5';
        document.body.style.color = isDark ? '#eee' : '#1e293b';
        document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
    });
    
    // ============================================
    // 9. INICIALIZACIÓN
    // ============================================
    
    window.addEventListener('load', async () => {
        await initDB();
        updateConnectionStatus();
        
        window.addEventListener('online', () => updateConnectionStatus());
        window.addEventListener('offline', () => updateConnectionStatus());
        
        window.addEventListener('popstate', () => {
            navigateTo(window.location.pathname);
        });
        
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            updateUIForAuth();
            
            if (currentUser && isOnline) {
                await syncPendingOperations();
            }
            
            let initialRoute = window.location.pathname;
            
            if (pages[initialRoute]) {
                if (pages[initialRoute].requiresAuth && !currentUser) {
                    navigateTo('/login');
                } else {
                    navigateTo(initialRoute);
                }
            } else {
                navigateTo('/');
            }
            
        });
        
        // Navegación por botones
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                navigateTo(btn.dataset.route);
            });
        });
    });
</script>

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registrado:', reg))
                .catch(err => console.log('SW error:', err));
        });
    }
</script>
