<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="Legado Avícola - Aplicación profesional">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <title>Legado Avícola</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>🏆 Legado Avícola</h1>
                <div id="userStatus" class="user-status"></div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="app-nav">
            <button data-page="home" class="nav-btn active">
                <span class="nav-icon">🏠</span>
                <span>Inicio</span>
            </button>
            <button data-page="about" class="nav-btn">
                <span class="nav-icon">ℹ️</span>
                <span>Info</span>
            </button>
            <button data-page="contact" class="nav-btn">
                <span class="nav-icon">📞</span>
                <span>Contacto</span>
            </button>
            <button data-page="gallery" class="nav-btn">
                <span class="nav-icon">🖼️</span>
                <span>Galería</span>
            </button>
            <button data-page="torneo" class="nav-btn protected-btn" style="display:none;">
                <span class="nav-icon">🏆</span>
                <span>Torneo</span>
            </button>
            <button data-page="cotejo" class="nav-btn protected-btn" style="display:none;">
                <span class="nav-icon">⚽</span>
                <span>Cotejo</span>
            </button>
            <button data-page="juez" class="nav-btn protected-btn" style="display:none;">
                <span class="nav-icon">⚖️</span>
                <span>Juez</span>
            </button>
            <button data-page="perfil" class="nav-btn protected-btn" style="display:none;">
                <span class="nav-icon">👤</span>
                <span>Perfil</span>
            </button>
        </nav>

        <!-- Main Content -->
        <main id="mainContent" class="main-content">
            <div class="loading-spinner">Cargando...</div>
        </main>

        <!-- Login Modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="loginForm">
                    <h2>Iniciar Sesión</h2>
                    <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                    <input type="password" id="loginPassword" placeholder="Contraseña" required>
                    <button id="btnLogin" class="btn-primary">Ingresar</button>
                    <p>¿No tienes cuenta? <a href="#" id="showRegister">Regístrate</a></p>
                </div>
                <div id="registerForm" style="display:none;">
                    <h2>Registro</h2>
                    <input type="email" id="registerEmail" placeholder="Correo electrónico" required>
                    <input type="password" id="registerPassword" placeholder="Contraseña" required>
                    <button id="btnRegister" class="btn-primary">Registrarse</button>
                    <p>¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia Sesión</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        
        // Tu configuración de Firebase (REEMPLAZA CON TUS DATOS)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            databaseURL: "TU_DATABASE_URL",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };
        
        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        // Variables globales
        let currentUser = null;
        let userPermissions = {};
        let currentPage = 'home';
        
        // Función para cargar contenido de página
        async function loadPage(pageName, isProtected = false) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = '<div class="loading-spinner">Cargando...</div>';
            
            try {
                let url = '';
                if (isProtected) {
                    url = `pages/protected/${pageName}.html`;
                } else {
                    url = `pages/public/${pageName}.html`;
                }
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Página no encontrada');
                const html = await response.text();
                mainContent.innerHTML = html;
                
                // Ejecutar scripts específicos de la página si existen
                const scripts = mainContent.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    newScript.textContent = oldScript.textContent;
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
                
                // Guardar en cache para offline
                if ('caches' in window) {
                    const cache = await caches.open('pages-cache-v1');
                    await cache.put(url, new Response(html));
                }
                
            } catch (error) {
                console.error('Error loading page:', error);
                // Intentar cargar desde cache
                const cachedResponse = await caches.match(`pages/${isProtected ? 'protected' : 'public'}/${pageName}.html`);
                if (cachedResponse) {
                    const html = await cachedResponse.text();
                    mainContent.innerHTML = html;
                } else {
                    mainContent.innerHTML = '<div class="error-message">Error al cargar la página. Verifica tu conexión.</div>';
                }
            }
        }
        
        // Verificar permisos del usuario
        async function checkUserPermissions(userId) {
            try {
                const permissionsRef = ref(database, `users/${userId}/permissions`);
                const snapshot = await get(permissionsRef);
                if (snapshot.exists()) {
                    userPermissions = snapshot.val();
                } else {
                    // Crear permisos por defecto
                    const defaultPermissions = {
                        torneo: false,
                        cotejo: false,
                        juez: false,
                        perfil: true
                    };
                    await set(permissionsRef, defaultPermissions);
                    userPermissions = defaultPermissions;
                }
                
                // Mostrar/ocultar botones según permisos
                updateNavigationByPermissions();
                
            } catch (error) {
                console.error('Error checking permissions:', error);
            }
        }
        
        // Actualizar navegación según permisos
        function updateNavigationByPermissions() {
            const protectedBtns = document.querySelectorAll('.protected-btn');
            protectedBtns.forEach(btn => {
                const page = btn.getAttribute('data-page');
                if (userPermissions[page]) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            });
        }
        
        // Actualizar UI según estado de autenticación
        function updateAuthUI(user) {
            const userStatus = document.getElementById('userStatus');
            const loginModal = document.getElementById('loginModal');
            
            if (user) {
                userStatus.innerHTML = `
                    <div class="user-info">
                        <span>👤 ${user.email}</span>
                        <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
                    </div>
                `;
                document.getElementById('btnLogout')?.addEventListener('click', () => {
                    signOut(auth);
                });
                loginModal.style.display = 'none';
                currentUser = user;
                checkUserPermissions(user.uid);
                
                // Recargar página actual si es protegida
                if (currentPage === 'torneo' || currentPage === 'cotejo' || currentPage === 'juez' || currentPage === 'perfil') {
                    loadPage(currentPage, true);
                }
            } else {
                userStatus.innerHTML = '<button id="btnShowLogin" class="btn-login">Iniciar Sesión</button>';
                document.getElementById('btnShowLogin')?.addEventListener('click', () => {
                    loginModal.style.display = 'block';
                });
                currentUser = null;
                userPermissions = {};
                updateNavigationByPermissions();
                
                // Si está en página protegida, redirigir a home
                if (currentPage === 'torneo' || currentPage === 'cotejo' || currentPage === 'juez' || currentPage === 'perfil') {
                    navigateTo('home');
                }
            }
        }
        
        // Navegación
        function navigateTo(pageName) {
            currentPage = pageName;
            
            // Actualizar botones activos
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.getAttribute('data-page') === pageName) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // Verificar si es página protegida
            const protectedPages = ['torneo', 'cotejo', 'juez', 'perfil'];
            const isProtected = protectedPages.includes(pageName);
            
            if (isProtected && !currentUser) {
                document.getElementById('loginModal').style.display = 'block';
                return;
            }
            
            if (isProtected && !userPermissions[pageName]) {
                loadPage('home', false);
                alert('No tienes permiso para acceder a esta página');
                return;
            }
            
            loadPage(pageName, isProtected);
        }
        
        // Event listeners de navegación
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const page = btn.getAttribute('data-page');
                navigateTo(page);
            });
        });
        
        // Modal logic
        const modal = document.getElementById('loginModal');
        const closeBtn = document.querySelector('.close');
        
        closeBtn.onclick = () => {
            modal.style.display = 'none';
        };
        
        window.onclick = (event) => {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
        
        // Login/Register handlers
        document.getElementById('showRegister')?.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        });
        
        document.getElementById('showLogin')?.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        });
        
        document.getElementById('btnLogin')?.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                modal.style.display = 'none';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
        
        document.getElementById('btnRegister')?.addEventListener('click', async () => {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                // Crear permisos por defecto para nuevo usuario
                await set(ref(database, `users/${userCredential.user.uid}/permissions`), {
                    torneo: false,
                    cotejo: false,
                    juez: false,
                    perfil: true
                });
                modal.style.display = 'none';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
        
        // Monitorear estado de autenticación
        onAuthStateChanged(auth, (user) => {
            updateAuthUI(user);
        });
        
        // Cargar página inicial
        navigateTo('home');
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('SW registered:', registration);
                }).catch(error => {
                    console.log('SW registration failed:', error);
                });
            });
        }
    </script>
</body>
</html>
