<html lang="es">
<head>

    <meta name="theme-color" content="#1877f2">
    <meta name="description" content="GallosLive - Plataforma líder en gestión de torneos y competencias">
    <meta name="keywords" content="torneos, competencias, deportes, gaming, gestión">
    <link rel="canonical" href="https://galloslive.com/">
    
    <!-- Open Graph Tags (Dinámicos por página) -->
    <meta property="og:site_name" content="GallosLive">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://galloslive.com/">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@galloslive">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- CSP Meta Tag -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; font-src 'self' data:;">
    
    <title>GallosLive - Torneos y Competencias</title>
    
    <style>
        /* ==================== CSS RESET & VARIABLES ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Light Theme */
            --bg-primary: #ffffff;
            --bg-secondary: #f0f2f5;
            --text-primary: #1e1e2f;
            --text-secondary: #65676b;
            --border-color: #e4e6eb;
            --card-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.95);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
            --primary: #1877f2;
            --primary-dark: #0c63d4;
            --success: #42b72a;
            --danger: #e41e3f;
            --warning: #f7b928;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }
        
        [data-theme="dark"] {
            --bg-primary: #18191a;
            --bg-secondary: #242526;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --border-color: #3e4042;
            --card-bg: #242526;
            --header-bg: rgba(24, 25, 26, 0.95);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }
        
        /* Full-bleed layout */
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .main-content {
            flex: 1;
            padding: 80px 16px 80px 16px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        @media (min-width: 1024px) {
            .main-content {
                padding: 80px 24px 40px 280px;
            }
        }
        
        /* ==================== HEADER ==================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }
        
        @media (min-width: 1024px) {
            .header {
                left: 260px;
                padding: 0 24px;
            }
            .header.sidebar-collapsed {
                left: 72px;
            }
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), #00c6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .connection-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            transition: var(--transition);
        }
        
        .connection-indicator.offline {
            background: var(--danger);
        }
        
        .pending-badge {
            background: var(--danger);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        /* ==================== SIDEBAR DESKTOP ==================== */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            transform: translateX(-100%);
            transition: var(--transition);
            z-index: 999;
            overflow-y: auto;
        }
        
        @media (min-width: 1024px) {
            .sidebar {
                transform: translateX(0);
            }
            .sidebar.collapsed {
                width: 72px;
            }
            .sidebar.collapsed .sidebar-link span {
                display: none;
            }
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-nav {
            padding: 16px 0;
        }
        
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            text-decoration: none;
            transition: var(--transition);
            border-radius: 8px;
            margin: 4px 8px;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: var(--bg-secondary);
        }
        
        .sidebar-link svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
        
        /* ==================== BOTTOM NAVIGATION (Móvil) ==================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        @media (min-width: 1024px) {
            .bottom-nav {
                display: none;
            }
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.7rem;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
        }
        
        /* ==================== CARDS Y COMPONENTES ==================== */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            margin-bottom: 16px;
        }
        
        .card:hover {
            box-shadow: var(--shadow-md);
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .error-message {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 4px;
        }
        
        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: var(--bg-primary);
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1100;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        
        @media (min-width: 1024px) {
            .toast {
                bottom: 24px;
            }
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* Skeleton Loaders */
        .skeleton {
            background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-secondary) 50%, var(--border-color) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .main-content {
                padding: 72px 12px 72px 12px;
            }
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #00c6ff 100%);
            border-radius: var(--border-radius);
            color: white;
            margin-bottom: 40px;
        }
        
        /* Loading spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>

        <main class="main-content" id="app"></main>

    <div id="toast" class="toast"></div>

    <div class="modal" id="modal">

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/zod@3.22.4/lib/index.umd.js"></script>
    
    <script>
        // ==================== SECURITY & SANITIZATION ====================
        
        
        // Sanitización de inputs
        function sanitizeInput(input) {
            if (typeof input !== 'string') return input;
            return DOMPurify.sanitize(input, {
                ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'p', 'br'],
                ALLOWED_ATTR: []
            });
        }
        
        // Validación con Zod
        const validationSchemas = {
            email: zod.string().email().regex(/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/),
            password: zod.string().min(8).regex(/^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/),
            name: zod.string().min(2).max(50).regex(/^[a-zA-ZáéíóúñÑ\s]+$/),
            phone: zod.string().regex(/^\+[1-9]\d{1,14}$/),
            url: zod.string().url()
        };
        
        function validateData(schema, data) {
            try {
                validationSchemas[schema].parse(data);
                return { valid: true, error: null };
            } catch (e) {
                return { valid: false, error: e.errors };
            }
        }
        
        // Encriptación local con SubtleCrypto
        async function encryptLocalData(data, password = 'default-key') {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                encoder.encode(password),
                'PBKDF2',
                false,
                ['deriveKey']
            );
            const key = await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: encoder.encode('salt'), iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt']
            );
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv },
                key,
                encoder.encode(JSON.stringify(data))
            );
            return { encrypted, iv };
        }
        
        // ==================== INDEXEDDB ====================
        const DB_NAME = 'GallosLiveDB';
        const DB_VERSION = 1;
        let db = null;
        
        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('users')) {
                        db.createObjectStore('users', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('offlineData')) {
                        const store = db.createObjectStore('offlineData', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('syncStatus', 'syncStatus');
                    }
                    if (!db.objectStoreNames.contains('pendingOperations')) {
                        const store = db.createObjectStore('pendingOperations', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('priority', 'priority');
                        store.createIndex('timestamp', 'timestamp');
                    }
                    if (!db.objectStoreNames.contains('userSessions')) {
                        db.createObjectStore('userSessions', { keyPath: 'sessionId' });
                    }
                    if (!db.objectStoreNames.contains('mediaCache')) {
                        db.createObjectStore('mediaCache', { keyPath: 'url' });
                    }
                    if (!db.objectStoreNames.contains('torneos')) {
                        db.createObjectStore('torneos', { keyPath: 'id' });
                    }
                };
            });
        }
        
        async function addToStore(storeName, data) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.put(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        async function getFromStore(storeName, key) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        async function getAllFromStore(storeName) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        // ==================== AUTENTICACIÓN OFFLINE ====================
        let currentUser = null;
        
        async function registerUser(userData) {
            const validation = validateData('email', userData.email);
            if (!validation.valid) throw new Error('Email inválido');
            const passValidation = validateData('password', userData.password);
            if (!passValidation.valid) throw new Error('Contraseña inválida');
            const nameValidation = validateData('name', userData.name);
            if (!nameValidation.valid) throw new Error('Nombre inválido');
            
            const userId = crypto.randomUUID();
            const hashedPassword = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(userData.password));
            const user = {
                id: userId,
                email: userData.email,
                passwordHash: Array.from(new Uint8Array(hashedPassword)),
                name: sanitizeInput(userData.name),
                createdAt: Date.now()
            };
            await addToStore('users', user);
            
            // Queue para sincronizar con backend
            await addToStore('pendingOperations', {
                type: 'REGISTER',
                data: user,
                priority: 'high',
                timestamp: Date.now(),
                syncStatus: 'pending'
            });
            
            return user;
        }
        
        async function loginUser(email, password) {
            const users = await getAllFromStore('users');
            const passwordHash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
            const passwordHashArray = Array.from(new Uint8Array(passwordHash));
            const user = users.find(u => u.email === email && JSON.stringify(u.passwordHash) === JSON.stringify(passwordHashArray));
            
            if (!user) throw new Error('Credenciales inválidas');
            
            const sessionId = crypto.randomUUID();
            const session = {
                sessionId,
                userId: user.id,
                createdAt: Date.now(),
                expiresAt: Date.now() + 30 * 60 * 1000 // 30 minutos
            };
            await addToStore('userSessions', session);
            currentUser = user;
            localStorage.setItem('sessionId', sessionId);
            return user;
        }
        
        async function logoutUser() {
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId && db) {
                const transaction = db.transaction(['userSessions'], 'readwrite');
                transaction.objectStore('userSessions').delete(sessionId);
            }
            localStorage.removeItem('sessionId');
            currentUser = null;
        }
        
        async function checkSession() {
            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) return false;
            const session = await getFromStore('userSessions', sessionId);
            if (!session || session.expiresAt < Date.now()) {
                localStorage.removeItem('sessionId');
                return false;
            }
            const user = await getFromStore('users', session.userId);
            if (user) currentUser = user;
            return !!user;
        }
        
        // ==================== SINCRONIZACIÓN CON BACKOFF ====================
        async function syncWithBackoff(operation, retries = 5) {
            let delay = 3000;
            for (let i = 0; i < retries; i++) {
                try {
                    const result = await operation();
                    return result;
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }
        
        async function syncPendingOperations() {
            if (!navigator.onLine) return;
            
            const pendingOps = await getAllFromStore('pendingOperations');
            for (const op of pendingOps) {
                if (op.syncStatus === 'synced') continue;
                try {
                    await syncWithBackoff(async () => {
                        // Simular envío a backend
                        console.log('Sincronizando:', op);
                        return { success: true };
                    });
                    op.syncStatus = 'synced';
                    await addToStore('pendingOperations', op);
                    updatePendingBadge();
                } catch (error) {
                    op.syncStatus = 'failed';
                    await addToStore('pendingOperations', op);
                    showToast(`Error sincronizando: ${error.message}`, 'error');
                }
            }
        }
        
        async function updatePendingBadge() {
            const pending = await getAllFromStore('pendingOperations');
            const pendingCount = pending.filter(p => p.syncStatus === 'pending').length;
            const badge = document.getElementById('pendingBadge');
            if (pendingCount > 0) {
                badge.style.display = 'inline-block';
                badge.textContent = pendingCount;
            } else {
                badge.style.display = 'none';
            }
        }
        
        // ==================== ROUTER SPA ====================
        const routes = {

            },
            '/perfil': {

            },
            '/inscripciones': {

            },
            '/crear-torneo': { 
                title: 'Crear Torneo - GallosLive',

        function updateMetaTags(route) {
            document.title = route.title;
            const ogTitle = document.querySelector('meta[property="og:title"]');
            const ogImage = document.querySelector('meta[property="og:image"]');
            const ogDescription = document.querySelector('meta[property="og:description"]');
            
            if (ogTitle) ogTitle.setAttribute('content', route.title);
            if (ogImage) ogImage.setAttribute('content', `https://galloslive.com/${route.ogImage || 'og-default.jpg'}`);
            if (ogDescription) ogDescription.setAttribute('content', `GallosLive - ${route.title}`);
        }
        
        async function router() {
            let path = window.location.pathname;
            if (path === '') path = '/';
            
            let route = routes[path];
            if (!route) {
                route = { render: renderNotFound, title: '404 - GallosLive', public: true };
            }
            
            // Verificar autenticación
            const isLoggedIn = await checkSession();
            if (!route.public && !isLoggedIn) {
                window.history.pushState({}, '', '/login');
                route = routes['/login'];
            }
            
            updateMetaTags(route);
            
            const app = document.getElementById('app');
            if (app) {
                app.innerHTML = '<div class="spinner"></div>';
                try {
                    const content = await route.render(isLoggedIn);
                    app.innerHTML = content;
                } catch (error) {
                    app.innerHTML = `<div class="card"><h3>Error</h3><p>${error.message}</p></div>`;
                }
            }
            
            updateNavigation(isLoggedIn);
        }
        
        function updateNavigation(isLoggedIn) {
            const navItems = isLoggedIn ? [
                { path: '/dashboard', icon: '📊', label: 'Dashboard' },
                { path: '/mis-torneos', icon: '🏆', label: 'Torneos' },
                { path: '/crear-torneo', icon: '+', label: 'Crear' },
                { path: '/inscripciones', icon: '📝', label: 'Mis Torneos' },
                { path: '/perfil', icon: '👤', label: 'Perfil' }
            ] : [
                { path: '/', icon: '🏠', label: 'Inicio' },
                { path: '/torneos-publicos', icon: '🏆', label: 'Torneos' },
                { path: '/ranking', icon: '📊', label: 'Ranking' },
                { path: '/contacto', icon: '📧', label: 'Contacto' },
                { path: '/login', icon: '🔑', label: 'Login' }
            ];
            
            // Actualizar bottom nav
            const bottomNav = document.getElementById('bottomNav');
            if (bottomNav) {
                bottomNav.innerHTML = navItems.map(item => `
                    <a href="${item.path}" class="nav-item ${window.location.pathname === item.path ? 'active' : ''}" data-link>
                        <span style="font-size:1.5rem">${item.icon}</span>
                        <span>${item.label}</span>
                    </a>
                `).join('');
            }
            
            // Actualizar sidebar
            const sidebarNav = document.getElementById('sidebarNav');
            if (sidebarNav && window.innerWidth >= 1024) {
                sidebarNav.innerHTML = navItems.map(item => `
                    <a href="${item.path}" class="sidebar-link ${window.location.pathname === item.path ? 'active' : ''}" data-link>
                        <span style="font-size:1.3rem">${item.icon}</span>
                        <span>${item.label}</span>
                    </a>
                `).join('');
            }
        }

        // ==================== UTILITIES & EVENT HANDLERS ====================
        async function createTournamentOffline(tournamentData) {
            const tournament = {
                id: crypto.randomUUID(),
                ...tournamentData,
                createdAt: Date.now(),
                syncStatus: 'pending'
            };
            await addToStore('torneos', tournament);
            await addToStore('pendingOperations', {
                type: 'CREATE_TOURNAMENT',
                data: tournament,
                priority: 'high',
                timestamp: Date.now(),
                syncStatus: 'pending'
            });
            updatePendingBadge();
            showToast('Torneo creado offline, se sincronizará automáticamente', 'success');
            return tournament;
        }
        
        async function exportData() {
            const users = await getAllFromStore('users');
            const torneos = await getAllFromStore('torneos');
            const data = { users, torneos, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `galloslive-export-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Datos exportados correctamente', 'success');
        }
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Event Listeners dinámicos
        function setupEventListeners() {
            // Login form
            document.addEventListener('submit', async (e) => {
                if (e.target.id === 'loginForm') {
                    e.preventDefault();
                    const email = document.getElementById('loginEmail')?.value;
                    const password = document.getElementById('loginPassword')?.value;
                    try {
                        await loginUser(email, password);
                        showToast('Login exitoso', 'success');
                        window.location.href = '/dashboard';
                    } catch (error) {
                        showToast(error.message, 'error');
                    }
                }
                
                if (e.target.id === 'registerForm') {
                    e.preventDefault();
                    const name = document.getElementById('regName')?.value;
                    const email = document.getElementById('regEmail')?.value;
                    const password = document.getElementById('regPassword')?.value;
                    try {
                        await registerUser({ name, email, password });
                        showToast('Registro exitoso, ahora inicia sesión', 'success');
                        window.location.href = '/login';
                    } catch (error) {
                        showToast(error.message, 'error');
                    }
                }
                
                if (e.target.id === 'createTournamentForm') {
                    e.preventDefault();
                    const name = document.getElementById('tournamentName')?.value;
                    const startDate = document.getElementById('tournamentStartDate')?.value;
                    const description = document.getElementById('tournamentDescription')?.value;
                    await createTournamentOffline({ name, startDate, description });
                    window.location.href = '/mis-torneos';
                }
                
                if (e.target.id === 'contactForm') {
                    e.preventDefault();
                    const name = document.getElementById('contactName')?.value;
                    const email = document.getElementById('contactEmail')?.value;
                    const message = document.getElementById('contactMessage')?.value;
                    await addToStore('pendingOperations', {
                        type: 'CONTACT',
                        data: { name, email, message, timestamp: Date.now() },
                        priority: 'medium',
                        syncStatus: 'pending'
                    });
                    updatePendingBadge();
                    showToast('Mensaje guardado, se enviará cuando tengas conexión', 'success');
                    e.target.reset();
                }
            });
            
            // Navegación con links
            document.addEventListener('click', (e) => {
                const link = e.target.closest('[data-link]');
                if (link && link.getAttribute('href')) {
                    e.preventDefault();
                    const href = link.getAttribute('href');
                    window.history.pushState({}, '', href);
                    router();
                }
            });
            
            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const html = document.documentElement;
                    const currentTheme = html.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    html.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                });
            }
            
            // Sidebar collapse
            const collapseBtn = document.getElementById('collapseSidebar');
            if (collapseBtn) {
                collapseBtn.addEventListener('click', () => {
                    const sidebar = document.getElementById('sidebar');
                    const header = document.querySelector('.header');
                    sidebar.classList.toggle('collapsed');
                    header.classList.toggle('sidebar-collapsed');
                });
            }
            
            // Menu toggle móvil
            const menuToggle = document.getElementById('menuToggle');
            if (menuToggle) {
                menuToggle.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('open');
                });
            }
        }
        
        // Conexión online/offline
        function initConnectionMonitoring() {
            const indicator = document.getElementById('connectionIndicator');
            function updateIndicator() {
                if (navigator.onLine) {
                    indicator.classList.remove('offline');
                    indicator.classList.add('online');
                    syncPendingOperations();
                    showToast('Conexión recuperada, sincronizando...', 'success');
                } else {
                    indicator.classList.add('offline');
                    indicator.classList.remove('online');
                    showToast('Sin conexión, trabajando offline', 'warning');
                }
            }
            window.addEventListener('online', updateIndicator);
            window.addEventListener('offline', updateIndicator);
            updateIndicator();
            
            // Periodic sync
            setInterval(() => {
                if (navigator.onLine) syncPendingOperations();
            }, 30000);
        }
        
        // Inicialización
        async function init() {
            await openDatabase();
            await checkSession();
            initConnectionMonitoring();
            setupEventListeners();
            await router();
            
            // Registrar Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registrado:', reg);
                }).catch(err => console.log('SW error:', err));
            }
            
            // Cargar tema
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
        }
        
        // Exponer funciones globales
        window.logout = logoutUser;
        window.editTournament = (id) => { showToast('Editar torneo ' + id, 'info'); };
        window.deleteTournament = async (id) => {
            await addToStore('pendingOperations', {
                type: 'DELETE_TOURNAMENT',
                data: { id },
                priority: 'high',
                timestamp: Date.now(),
                syncStatus: 'pending'
            });
            updatePendingBadge();
            showToast('Torneo eliminado (offline)', 'success');
            router();
        };
        window.exportData = exportData;
        
        init();
    </script>
