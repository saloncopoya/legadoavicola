    enabled: true, version: '2.0',
    set(key, data, uid) { try { localStorage.setItem(`app_${key}_${uid}`, JSON.stringify({ version: this.version, timestamp: Date.now(), uid, data })); } catch(e){} },
    get(key, uid, maxAge=30*24*60*60*1000) {
      try { const raw = localStorage.getItem(`app_${key}_${uid}`); if(!raw) return null; const d = JSON.parse(raw); if(d.version !== this.version || Date.now() - d.timestamp > maxAge) return null; return d.data; } catch(e){ return null; }
    },
    setGlobal(key, data) { try { localStorage.setItem(`global_${key}`, JSON.stringify({ version: this.version, timestamp: Date.now(), data })); } catch(e){} },
    getGlobal(key, maxAge=30*24*60*60*1000) { try { const raw = localStorage.getItem(`global_${key}`); if(!raw) return null; const d=JSON.parse(raw); if(d.version !== this.version || Date.now()-d.timestamp > maxAge) return null; return d.data; } catch(e){ return null; } }

  addNotification(message, type='info', duration=4000) {

    const toast = document.createElement('div');
    toast.className = `toast-message toast-${type}`;
    toast.textContent = message;
    toast.addEventListener('click', () => { toast.style.opacity='0'; setTimeout(()=>toast.remove(),250); });
    container.appendChild(toast);
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, duration);
  },
  setUser(userData, profileData) { this.user.current = userData; this.user.profile = profileData; this.notify('user'); },
  clearUser() { this.user.current = null; this.user.profile = null; this.notify('user'); },

  setLoading(loading) { this.ui.isLoading = loading; this.notify('loading'); },
  subscribe(cb) { this.subscribers.push(cb); },
  notify(prop) { if(this._isRendering) return; this._isRendering=true; try{ this.subscribers.forEach(cb=>cb(prop)); }finally{ this._isRendering=false; } }
};

function sanitizarInput(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

let loadingTimeoutId = null;
function showLoadingScreen(msg,p=0){ const ls=document.getElementById('loading-screen'); if(ls) ls.style.display='flex'; const bar=document.getElementById('loading-progress-bar'); if(bar) bar.style.width=p+'%'; const statusDiv=document.getElementById('loading-status'); if(statusDiv && msg) statusDiv.textContent=msg; }
function hideLoadingScreen(){ const ls=document.getElementById('loading-screen'); if(ls) ls.style.display='none'; if(loadingTimeoutId) clearTimeout(loadingTimeoutId); }

// Inicialización Firebase
function initializeFirebase() {
  if(AppState.firebase.isEnabled) return true;
  try {
    const app = firebase.initializeApp(window.FIREBASE_CONFIG);
    AppState.firebase.app = app;
    AppState.firebase.auth = firebase.auth();
    AppState.firebase.isEnabled = true;
    setupAuthListener();
    return true;
  } catch(e){ console.error(e); AppState.addNotification('Error conectando con servidor','error'); return false; }
}

// Auth Listener
function setupAuthListener() {
  if(!AppState.firebase.auth) return;
  AppState.firebase.auth.onAuthStateChanged(async (user) => {
    if(user) {
      if(!AppState.firebase.database) AppState.firebase.database = firebase.database();
      const snap = await AppState.firebase.database.ref('users/'+user.uid).once('value');
      if(snap.exists()) {
        const profile = { id: user.uid, ...snap.val() };
        AppState.setUser(user, profile);
        if(profile.activated === true) AppState.setScreen('public');
        else AppState.setScreen('activation_pending');
      } else {
        // usuario nuevo (pero debe registrarse) -> mostramos login de nuevo o public
        AppState.clearUser();
        AppState.setScreen('public');
      }
      hideLoadingScreen();
    } else {
      AppState.clearUser();
      if(AppState.ui.currentScreen !== 'public' && AppState.ui.currentScreen !== 'login') AppState.setScreen('public');
      hideLoadingScreen();
    }
  });
}

    document.body.style.overflow = 'hidden';
    updateSideMenuContent();
  }
}

// LOGIN / REGISTRO
window.handleLogin = async function() {
  const email = document.getElementById('loginEmail')?.value;
  const pass = document.getElementById('loginPassword')?.value;
  if(!email || !pass) { AppState.addNotification('Completa campos','error'); return; }
  if(!AppState.firebase.isEnabled) initializeFirebase();
  showLoadingScreen('Iniciando sesión...',30);
  try {
    await AppState.firebase.auth.signInWithEmailAndPassword(email, pass);
    hideLoadingScreen();
  } catch(e) { hideLoadingScreen(); AppState.addNotification('Credenciales incorrectas','error'); }
};

window.handleCompleteRegister = async function() {
  const name = document.getElementById('regFullName')?.value;
  const email = document.getElementById('regEmail')?.value;
  const pass = document.getElementById('regPassword')?.value;
  const confirm = document.getElementById('regConfirm')?.value;
  const terms = document.getElementById('regTerms')?.checked;
  if(!name || !email || !pass || !confirm) { AppState.addNotification('Llena los campos obligatorios','error'); return; }
  if(pass !== confirm) { AppState.addNotification('Contraseñas no coinciden','error'); return; }
  if(!terms) { AppState.addNotification('Acepta términos','error'); return; }
  if(!AppState.firebase.isEnabled) initializeFirebase();
  showLoadingScreen('Registrando...',40);
  try {
    const cred = await AppState.firebase.auth.createUserWithEmailAndPassword(email, pass);
    const uid = cred.user.uid;
    if(!AppState.firebase.database) AppState.firebase.database = firebase.database();
    await AppState.firebase.database.ref('users/'+uid).set({
      displayName: name, realEmail: email, registeredAt: Date.now(), activated: false, gallo: false, isJudge: false, publicaciones: false, ventas: false, pedigri: false, maxDevices: 1
    });
    await AppState.firebase.auth.signOut();
    hideLoadingScreen();
    AppState.addNotification('Registro exitoso. Espera activación.','success');
    navigateTo('login');
  } catch(e) { hideLoadingScreen(); AppState.addNotification('Error: '+e.message,'error'); }
};

window.resetPassword = async function() {
  const email = document.getElementById('loginEmail')?.value;
  if(!email) { AppState.addNotification('Ingresa tu correo','error'); return; }
  if(!AppState.firebase.auth) initializeFirebase();
  try { await AppState.firebase.auth.sendPasswordResetEmail(email); AppState.addNotification('Revisa tu correo','success'); } catch(e){ AppState.addNotification('Error al enviar','error'); }
};

window.handleLogout = async function() { if(AppState.firebase.auth) await AppState.firebase.auth.signOut(); AppState.clearUser(); navigateTo('public'); toggleSideMenu(); };
window.logoutAndGoPublic = window.handleLogout;
window.checkActivationStatus = async function() { AppState.addNotification('Revisa más tarde con el administrador','info'); };
window.navigateTo = function(section) {
  if(section === 'login' && !AppState.firebase.isEnabled) initializeFirebase();
  if(section !== 'login' && !AppState.user.current && section !== 'public') { AppState.addNotification('Debes iniciar sesión','warning'); section='public'; }
  AppState.setScreen(section);
  window.history.pushState({}, '', `/?section=${section}`);
};
window.showLoginForm = function() { document.getElementById('loginFormDiv').style.display='block'; document.getElementById('registerFormDiv').style.display='none'; document.getElementById('tabLoginBtn').style.background='#8B4513'; document.getElementById('tabRegBtn').style.background='#f0f0f0'; };
window.showRegisterForm = function() { document.getElementById('loginFormDiv').style.display='none'; document.getElementById('registerFormDiv').style.display='block'; document.getElementById('tabRegBtn').style.background='#8B4513'; document.getElementById('tabLoginBtn').style.background='#f0f0f0'; };
window.handleLoginClick = function() { if(!AppState.firebase.isEnabled) initializeFirebase(); navigateTo('login'); };
window.mostrarModalInformativo = function() { AppState.addNotification('Calcutas y Subastas Javi Ruiz - Versión 2.0','info'); };

// Render principal
async function renderApp() {
  const appDiv = document.getElementById('social-app');
  if(!appDiv) return;
  const screen = AppState.ui.currentScreen;
  const user = AppState.user.current;
  let topBar = '';
  if(user && screen !== 'login' && screen !== 'activation_pending') topBar = renderMobileNavBar();
  else if(screen === 'public') topBar = renderPublicTopBar();
  let content = '';
  if(screen === 'public') content = renderPublicScreen();
  else if(screen === 'login') content = renderLoginScreen();
  else if(screen === 'activation_pending') content = renderActivationPendingScreen();
  else if(screen === 'share') content = window.renderShareScreen();
  else if(screen === 'ventas') content = window.renderVentasScreen();
  else if(screen === 'rooster') content = window.renderRoosterScreen();
  else if(screen === 'perfil') content = window.renderPerfilScreen();
  else if(screen === 'admin') content = window.renderAdminScreen();
  else if(screen === 'publicaciones') content = window.renderPublicacionesScreen();
  else if(screen === 'pedigri') content = window.renderPedigriScreen();
  else if(screen === 'juez') content = window.renderJuezScreen();
  else if(screen === 'configuraciones') content = window.renderConfiguracionesScreen();
  else content = renderPublicScreen();
  appDiv.innerHTML = topBar + `<div style="padding-top: ${topBar ? '60px' : '0'};">${content}</div>`;
  if(screen !== 'login') updateSideMenuContent();
}

AppState.subscribe(() => renderApp());

// Inicio
window.addEventListener('DOMContentLoaded', () => {
  const loadingDiv = document.getElementById('loading-screen');
  const socialApp = document.getElementById('social-app');
  const urlParams = new URLSearchParams(window.location.search);
  const sectionParam = urlParams.get('section');
  if(sectionParam && ['public','login','share','ventas','rooster'].includes(sectionParam)) AppState.ui.currentScreen = sectionParam;
  initializeFirebase();
  renderApp();
  setTimeout(() => {
    if(loadingDiv) loadingDiv.style.display = 'none';
    if(socialApp) socialApp.style.display = 'block';
  }, 1500);
});
window.toggleSideMenu = toggleSideMenu;
window.navigateTo = navigateTo;
window.handleLogin = handleLogin;
window.handleCompleteRegister = handleCompleteRegister;
window.handleLogout = handleLogout;
window.resetPassword = resetPassword;
window.showLoginForm = showLoginForm;
window.showRegisterForm = showRegisterForm;
window.checkActivationStatus = checkActivationStatus;
</script>
