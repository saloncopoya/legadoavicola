// ==============================================

const RateLimiter = {
    recordAttempt(action) { const key = `rate_${action}`; const now = Date.now(); const attempts = JSON.parse(localStorage.getItem(key) || '[]'); const recent = attempts.filter(t => now - t < 900000); recent.push(now); localStorage.setItem(key, JSON.stringify(recent)); return recent.length; },
    canAttempt(action, maxAttempts=5) { const key = `rate_${action}`; const now = Date.now(); const attempts = JSON.parse(localStorage.getItem(key) || '[]'); const recent = attempts.filter(t => now - t < 900000); localStorage.setItem(key, JSON.stringify(recent)); return recent.length < maxAttempts; },
    getWaitTime(action, maxAttempts=5) { const key = `rate_${action}`; const now = Date.now(); const attempts = JSON.parse(localStorage.getItem(key) || '[]'); if(attempts.length < maxAttempts) return 0; const oldest = Math.min(...attempts); const waitTime = 900000 - (now - oldest); return waitTime > 0 ? Math.ceil(waitTime/1000) : 0; }
};

// ==============================================
// FINGERPRINT
// ==============================================
let cachedFingerprintPromise = null;
function generateHash(str) {
    if(cachedFingerprintPromise) return cachedFingerprintPromise;
    if(window.crypto && window.crypto.subtle) {
        cachedFingerprintPromise = crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(hash => Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join(''));
        return cachedFingerprintPromise;
    }
    let hash = 0;
    for(let i=0; i<str.length; i++) { const char = str.charCodeAt(i); hash = ((hash<<5)-hash)+char; hash = hash & hash; }
    cachedFingerprintPromise = Promise.resolve(hash.toString(36));
    return cachedFingerprintPromise;
}
window.getDeviceFingerprint = function() {
    try {
        let gpuRenderer = 'unknown';
        try { const canvas = document.createElement('canvas'); const gl = canvas.getContext('webgl'); if(gl) { const debugInfo = gl.getExtension('WEBGL_debug_renderer_info'); if(debugInfo) gpuRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL); } } catch(e) {}
        const cpuCores = navigator.hardwareConcurrency || 'unknown';
        const pixelRatio = window.devicePixelRatio || 1;
        const physicalResolution = `${Math.round(screen.width * pixelRatio)}x${Math.round(screen.height * pixelRatio)}`;
        const ua = navigator.userAgent;
        let osFamily = 'unknown';
        if(ua.includes('Android')) osFamily = 'android';
        else if(ua.includes('iPhone')||ua.includes('iPad')) osFamily = 'ios';
        else if(ua.includes('Windows')) osFamily = 'windows';
        else if(ua.includes('Mac OS')) osFamily = 'macos';
        let architecture = 'unknown';
        if(ua.includes('arm64')) architecture = 'arm64';
        const components = { gpu: gpuRenderer, cores: cpuCores, resolution: physicalResolution, os: osFamily, arch: architecture };
        const uniqueString = `${gpuRenderer}|${cpuCores}|${physicalResolution}|${osFamily}|${architecture}`;
        return generateHash(uniqueString).then(hash => ({ fingerprint: hash, components: components, userAgent: ua }));
    } catch(error) { return Promise.reject(error); }
};

    try {
        const firebaseApp = firebase.initializeApp(window.FIREBASE_CONFIG);
        AppState.firebase.app = firebaseApp;
        AppState.firebase.auth = firebase.auth();
        AppState.firebase.isEnabled = true;
        setupAuthListener();
        return true;
    } catch(e) { console.error(e); return false; }

// ==============================================
// AUTH LISTENER
// ==============================================
async function loadUserProfile(uid) {
    if(!AppState.firebase.database) AppState.firebase.database = firebase.database();
    const cached = AppState.persistentCache.get('profile', uid);
    if(cached) {
        AppState.setUser(AppState.firebase.auth.currentUser, cached);
        return true;
    }
    const snap = await AppState.firebase.database.ref('users/'+uid).once('value');
    if(snap.exists()) {
        const profile = { id: uid, ...snap.val() };
        AppState.persistentCache.set('profile', profile, uid);
        AppState.setUser(AppState.firebase.auth.currentUser, profile);
        return true;
    }
    return false;
}

async function verificarDispositivo(user) {
    if(!user) return false;
    if(!AppState.firebase.database) AppState.firebase.database = firebase.database();
    try {
        const currentDevice = await window.getDeviceFingerprint();
        const userSnap = await AppState.firebase.database.ref('users/'+user.uid).once('value');
        if(!userSnap.exists()) return true;
        const userProfile = userSnap.val();
        const maxDevices = userProfile.maxDevices || 1;
        const devicesSnap = await AppState.firebase.database.ref(`dispositivos_autorizados/${user.uid}`).once('value');
        const authorizedDevices = devicesSnap.val() || {};
        if(authorizedDevices[currentDevice.fingerprint]) {
            await AppState.firebase.database.ref(`dispositivos_autorizados/${user.uid}/${currentDevice.fingerprint}/lastLogin`).set(firebase.database.ServerValue.TIMESTAMP);
            return true;
        }
        const devicesCount = Object.keys(authorizedDevices).length;
        if(devicesCount < maxDevices) {
            await AppState.firebase.database.ref(`dispositivos_autorizados/${user.uid}/${currentDevice.fingerprint}`).set({ fingerprint: currentDevice.fingerprint, firstSeen: firebase.database.ServerValue.TIMESTAMP, verified: true });
            return true;
        }
        await AppState.firebase.auth.signOut();
        AppState.addNotification(`🚫 LÍMITE DE DISPOSITIVOS ALCANZADO (${maxDevices}). Contacta al administrador.`, 'error', 8000);
        return false;
    } catch(e) { return false; }
}

function setupAuthListener() {
    if(!AppState.firebase.auth) return;
    AppState.firebase.auth.onAuthStateChanged(async (user) => {
        if(user) {
            if(!AppState.firebase.database) AppState.firebase.database = firebase.database();
            const accesoPermitido = await verificarDispositivo(user);
            if(!accesoPermitido) { AppState.clearUser(); AppState.setScreen('public'); return; }
            const perfilExiste = await loadUserProfile(user.uid);
            if(!perfilExiste) { return; }
            const profile = AppState.user.profile;
            if(profile?.activated === true) { RecurrentUserManager.markAsRecurrent(); AppState.setScreen('public'); }
            else { AppState.setScreen('activation_pending'); }
            hideLoadingScreen();
        } else {
            AppState.clearUser();
            if(AppState.ui.currentScreen !== 'public') AppState.setScreen('public');
            hideLoadingScreen();
        }
    });
}

// HANDLE LOGIN / REGISTER
// ==============================================
window.handleLogin = async function() {
    const email = document.getElementById('loginPhone')?.value.trim();
    const password = document.getElementById('loginPassword')?.value;
    if(!email || !password) { AppState.addNotification('Completa todos los campos', 'warning'); return; }
    if(!RateLimiter.canAttempt(`login_${email}`, 3)) { AppState.addNotification('Demasiados intentos. Espera unos minutos.', 'error'); return; }
    if(!AppState.firebase.isEnabled) initializeFirebase();
    showLoadingScreen('Iniciando sesión...', 30);
    try {
        RateLimiter.recordAttempt(`login_${email}`);
        await AppState.firebase.auth.signInWithEmailAndPassword(email, password);
        hideLoadingScreen();
    } catch(error) {
        hideLoadingScreen();
        if(error.code === 'auth/invalid-login-credentials') AppState.addNotification('❌ Email o contraseña incorrectos', 'error');
        else AppState.addNotification('Error al iniciar sesión', 'error');
    }
};

window.handleCompleteRegister = async function() {
    const fullName = sanitizarInput(document.getElementById('registerFullName')?.value || '');
    const realEmail = document.getElementById('registerRealEmail')?.value.trim();
    const partyName = sanitizarInput(document.getElementById('registerPartyName')?.value || '');
    const representative = sanitizarInput(document.getElementById('registerRepresentative')?.value || '');
    const phoneNumber = document.getElementById('registerPhone')?.value.trim() || '';
    const password = document.getElementById('registerPassword')?.value;
    const confirmPassword = document.getElementById('registerConfirmPassword')?.value;
    const termsAccepted = document.getElementById('registerTerms')?.checked || false;
    
    if(!fullName || !realEmail || !password || !confirmPassword) { AppState.addNotification('Completa los campos obligatorios', 'error'); return; }
    if(!validateEmail(realEmail)) { AppState.addNotification('Email inválido', 'error'); return; }
    if(password.length < 6) { AppState.addNotification('Contraseña mínimo 6 caracteres', 'error'); return; }
    if(password !== confirmPassword) { AppState.addNotification('Las contraseñas no coinciden', 'error'); return; }
    if(!termsAccepted) { AppState.addNotification('Debes aceptar los términos', 'error'); return; }
    if(!AppState.firebase.isEnabled) initializeFirebase();
    showLoadingScreen('Registrando cuenta...', 20);
    try {
        const userCredential = await AppState.firebase.auth.createUserWithEmailAndPassword(realEmail, password);
        if(!AppState.firebase.database) AppState.firebase.database = firebase.database();
        const user = userCredential.user;
        await user.updateProfile({ displayName: fullName });
        await AppState.firebase.database.ref('users/' + user.uid).set({
            uid: user.uid, displayName: fullName, realEmail: realEmail, registeredAt: Date.now(), registeredWith: 'email',
            activated: false, gallo: false, isJudge: false, publicaciones: false, ventas: false, pedigri: false, maxDevices: 1,
            ...(partyName && { partyName }), ...(representative && { representative }), ...(phoneNumber && { phone: phoneNumber })
        });
        await loadUserProfile(user.uid);
        AppState.addNotification('✅ Cuenta creada. Pendiente de activación.', 'success');
        await AppState.firebase.auth.signOut();
        hideLoadingScreen();
        AppState.setScreen('public');
    } catch(error) {
        hideLoadingScreen();
        if(error.code === 'auth/email-already-in-use') AppState.addNotification('Este email ya está registrado', 'error');
        else AppState.addNotification('Error al registrar', 'error');
    }
};

window.resetPassword = async function() {
    const email = document.getElementById('loginPhone')?.value.trim();
    if(!email) { AppState.addNotification('Ingresa tu correo electrónico', 'error'); return; }
    if(!AppState.firebase.auth) initializeFirebase();
    try {
        await AppState.firebase.auth.sendPasswordResetEmail(email);
        AppState.addNotification(`✅ Se envió un enlace de recuperación a: ${email}`, 'success');
    } catch(error) { AppState.addNotification('Error al enviar correo de recuperación', 'error'); }
};

window.handleLogout = async function() {
    const currentUid = AppState.user.current?.uid;
    if(currentUid && AppState.persistentCache) AppState.persistentCache.clearUserCache(currentUid);
    RecurrentUserManager.clear();
    if(AppState.firebase.auth) await AppState.firebase.auth.signOut();
    AppState.clearUser();
    localStorage.removeItem('lastScreen');
    sessionStorage.clear();
    window.history.pushState({}, '', '/');
    AppState.setScreen('public');
    hideLoadingScreen();
};

function toggleSideMenu() {
    const menu = document.getElementById('side-menu');
    const overlay = document.getElementById('side-menu-overlay');
    if(menu.style.right === '0px') { menu.style.right = '-350px'; overlay.style.display = 'none'; document.body.style.overflow = ''; }
    else { menu.style.right = '0px'; overlay.style.display = 'block'; document.body.style.overflow = 'hidden'; updateSideMenuContent(); }
}

async function renderApp() {
    const appDiv = document.getElementById('social-app');
    if(!appDiv) return;
    const screen = AppState.ui.currentScreen;
    const user = AppState.user.current;
    let topBar = '';
    if(user && screen !== 'login' && screen !== 'activation_pending') topBar = renderMobileNavBar();
    else if(screen === 'public') topBar = renderPublicTopBar();
    let content = '';
    if(screen === 'public') content = renderPublicScreen();
    else if(screen === 'login') content = renderLoginScreen();
    else if(screen === 'activation_pending') content = renderActivationPendingScreen();
    else if(screen === 'share') content = window.renderShareScreen();
    else if(screen === 'ventas') content = window.renderVentasScreen();
    else if(screen === 'rooster') content = window.renderRoosterScreen();
    else if(screen === 'perfil') content = window.renderPerfilScreen();
    else if(screen === 'admin') content = window.renderAdminScreen();
    else if(screen === 'publicaciones') content = window.renderPublicacionesScreen();
    else if(screen === 'pedigri') content = window.renderPedigriScreen();
    else if(screen === 'juez') content = window.renderJuezScreen();
    else if(screen === 'configuraciones') content = window.renderConfiguracionesScreen();
    else content = renderPublicScreen();
    appDiv.innerHTML = topBar + `<div style="padding-top: ${topBar ? '60px' : '0'};">${content}</div>`;
}

window.navigateTo = function(section) {
    if(section === 'login' && !AppState.firebase.isEnabled) initializeFirebase();
    if(section !== 'login' && section !== 'public' && !AppState.user.current) { AppState.addNotification('Debes iniciar sesión', 'warning'); section = 'public'; }
    if(section && section !== 'login' && section !== 'activation_pending') localStorage.setItem('lastScreen', section);
    AppState.setScreen(section);
    window.history.pushState({}, '', `/?section=${section}`);
};

window.checkActivationStatusWithFeedback = async function() {
    if(!AppState.user.current || !AppState.firebase.database) { AppState.addNotification('Error de conexión', 'error'); return; }
    const snap = await AppState.firebase.database.ref('users/'+AppState.user.current.uid+'/activated').once('value');
    if(snap.val() === true) { AppState.addNotification('✅ ¡Cuenta activada!', 'success'); await loadUserProfile(AppState.user.current.uid); AppState.setScreen('public'); }
    else { AppState.addNotification('⏳ Tu cuenta aún no ha sido activada', 'warning'); }
};

window.showLoginForm = function() {
    document.getElementById('loginFormDiv').style.display = 'block';
    document.getElementById('registerFormDiv').style.display = 'none';
    const loginBtn = document.getElementById('tabLoginBtn');
    const regBtn = document.getElementById('tabRegBtn');
    if(loginBtn) { loginBtn.style.background = '#8B4513'; loginBtn.style.color = 'white'; }
    if(regBtn) { regBtn.style.background = '#f0f0f0'; regBtn.style.color = '#666'; }
};
window.showRegisterForm = function() {
    document.getElementById('loginFormDiv').style.display = 'none';
    document.getElementById('registerFormDiv').style.display = 'block';
    const loginBtn = document.getElementById('tabLoginBtn');
    const regBtn = document.getElementById('tabRegBtn');
    if(regBtn) { regBtn.style.background = '#8B4513'; regBtn.style.color = 'white'; }
    if(loginBtn) { loginBtn.style.background = '#f0f0f0'; loginBtn.style.color = '#666'; }
};
window.handleLoginClick = function() { if(!AppState.firebase.isEnabled) initializeFirebase(); navigateTo('login'); };
window.mostrarModalInformativo = function() { AppState.addNotification('CALCUTAS Y SUBASTAS JAVI RUIZ - Versión 2.0', 'info'); };
window.logoutAndGoPublic = handleLogout;

// ==============================================
// CONEXIÓN Y CARGA INICIAL
// ==============================================
function updateConnectionBar() {
    const bar = document.getElementById('connection-status-bar');
    const msg = document.getElementById('connection-status-message');
    if(!navigator.onLine) { bar.classList.add('visible'); bar.style.backgroundColor = '#626466'; msg.textContent = '¡Sin acceso a internet! Conectate a una red....'; }
    else if(bar.classList.contains('visible')) { bar.classList.remove('visible'); }
}
window.addEventListener('online', updateConnectionBar);
window.addEventListener('offline', updateConnectionBar);
updateConnectionBar();

AppState.subscribe(() => renderApp());

window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const section = urlParams.get('section');
    if(section && ['public','login','share','ventas','rooster','perfil','admin'].includes(section)) AppState.ui.currentScreen = section;
    initializeFirebase();
    renderApp();
    setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('social-app').style.display = 'block';
    }, 1500);
});
</script>
