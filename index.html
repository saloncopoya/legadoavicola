    <style>
        /* RESET COMPLETO - SIN MÁRGENES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            overflow-x: hidden;
            padding-top: 56px;
            padding-bottom: 56px;
        }

        /* Variables CSS */
        :root {
            --primary: #1877f2;
            --primary-dark: #0c63d4;
            --secondary: #42b72a;
            --danger: #e41e3f;
            --warning: #f7b928;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
        }

        /* Header Superior - Glassmorphism */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .icon-btn:hover {
            background: #e4e6e9;
        }

        /* Status Indicator */
        .connection-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            transition: all 0.3s;

            background: #ef4444;
            box-shadow: 0 0 0 2px rgba(239,68,68,0.3);

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 0;
            transition: all 0.2s;
            color: var(--gray);

        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item span:first-child {
            font-size: 22px;
        }

        /* Main Content */
        .main-content {
            min-height: calc(100vh - 112px);
            padding: 16px;
        }

        /* Cards estilo Facebook */
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Formularios */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24,119,242,0.1);
        }

        /* Botones */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Tablas responsivas */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--light);
            font-weight: 600;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;

        .badge-warning {
            background: #fef9c3;

        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 72px;
            left: 16px;
            right: 16px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: #1e293b;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {

            }

        /* Desktop adjustments */
        @media (min-width: 768px) {

<script>
    // ============================================
    // 1. CONFIGURACIÓN INICIAL Y SEGURIDAD
    // ============================================
    
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyASox7mRak5V0py29htEVWCVeipGpA0yfs",
        authDomain: "galloslivebadge.firebaseapp.com",
        databaseURL: "https://galloslivebadge-default-rtdb.firebaseio.com",
        projectId: "galloslivebadge",
        storageBucket: "galloslivebadge.firebasestorage.app",
        messagingSenderId: "979482928760",
        appId: "1:979482928760:web:3ea879dc4ee1e020df6f8d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    
    // Estado global
    let currentUser = null;
    let isOnline = navigator.onLine;
    let currentRoute = '/';
    let db = null;
    
    // Anti-debugging / Protección consola
    (function antiDebug() {
        // Detectar DevTools
        setInterval(() => {
            const before = new Date();
            debugger;
            const after = new Date();
            if (after - before > 100) {
                document.body.innerHTML = '<div style="padding:20px;text-align:center"><h1>⚠️ DevTools Detectado</h1><p>Por favor cierra las herramientas de desarrollo</p></div>';
            }
        }, 1000);
        
        // Bloquear eval y Function
        const originalEval = window.eval;
        window.eval = function() { throw new Error('Eval bloqueado por seguridad'); };
        
        // Limpiar console.log en producción (opcional)
        if (window.location.hostname !== 'localhost') {
            console.log = function() {};
            console.info = function() {};
        }
    })();
    
    // Sanitización de inputs
    function sanitizeInput(input) {
        if (typeof input !== 'string') return input;
        return DOMPurify.sanitize(input, {
            ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'p', 'br'],
            ALLOWED_ATTR: ['class']
        });
    }
    
    // Validación de email
    function validateEmail(email) {
        const re = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        return re.test(email);
    }
    
    // Validación de password
    function validatePassword(password) {
        return password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password);
    }
    
    // ============================================
    // 2. INDEXEDDB - ALMACENAMIENTO OFFLINE
    // ============================================
    
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('GallosLiveDB', 3);
            
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                
                if (!db.objectStoreNames.contains('offlineTorneos')) {
                    const store = db.createObjectStore('offlineTorneos', { keyPath: 'id', autoIncrement: true });
                    store.createIndex('userId', 'userId', { unique: false });
                    store.createIndex('syncStatus', 'syncStatus', { unique: false });
                }
                
                if (!db.objectStoreNames.contains('pendingOps')) {
                    const pendingStore = db.createObjectStore('pendingOps', { keyPath: 'id', autoIncrement: true });
                    pendingStore.createIndex('userId', 'userId', { unique: false });
                    pendingStore.createIndex('timestamp', 'timestamp', { unique: false });
                }
                
                if (!db.objectStoreNames.contains('users')) {
                    db.createObjectStore('users', { keyPath: 'uid' });
                }
            };
        });
    }
    
    async function saveToDB(store, data) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction([store], 'readwrite');
            const request = tx.objectStore(store).put(data);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function getFromDB(store, key = null) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction([store], 'readonly');
            let request;
            if (key) {
                request = tx.objectStore(store).get(key);
            } else {
                request = tx.objectStore(store).getAll();
            }
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    // ============================================
    // 3. SISTEMA DE SINCRONIZACIÓN
    // ============================================
    
    async function syncPendingOperations() {
        if (!isOnline || !currentUser) return;
        
        const pendingOps = await getFromDB('pendingOps');
        const userOps = pendingOps.filter(op => op.userId === currentUser.uid);
        
        if (userOps.length === 0) return;
        
        showToast(`🔄 Sincronizando ${userOps.length} elementos...`, 'info');
        
        for (const op of userOps) {
            try {
                if (op.type === 'CREATE_TORNEO') {
                    const torneoRef = database.ref(`torneos/${currentUser.uid}/${op.data.offlineId}`);
                    await torneoRef.set(op.data);
                }
                
                // Actualizar estado local
                const tx = db.transaction(['pendingOps'], 'readwrite');
                tx.objectStore('pendingOps').delete(op.id);
                
                // Actualizar torneo local como sincronizado
                const allTorneos = await getFromDB('offlineTorneos');
                const torneoToUpdate = allTorneos.find(t => t.offlineId === op.data.offlineId);
                if (torneoToUpdate) {
                    torneoToUpdate.syncStatus = 'synced';
                    await saveToDB('offlineTorneos', torneoToUpdate);
                }
            } catch (error) {
                console.error('Error sync:', error);
            }
        }
        
        showToast('✅ Sincronización completada', 'success');
        if (currentRoute === '/mis-torneos') renderMisTorneos();
    }
    
    // ============================================
    // 4. FUNCIONES DE AUTENTICACIÓN
    // ============================================
    
    async function handleLogin(email, password) {
        if (!validateEmail(email)) throw new Error('Email inválido');
        if (!validatePassword(password)) throw new Error('Password debe tener 8+ caracteres, una mayúscula y un número');
        
        const result = await auth.signInWithEmailAndPassword(email, password);
        currentUser = result.user;
        
        await saveToDB('users', {
            uid: currentUser.uid,
            email: currentUser.email,
            displayName: currentUser.displayName
        });
        
        updateUIForAuth();
        await syncPendingOperations();
        navigateTo('/dashboard');
        showToast('✅ Bienvenido ' + (currentUser.displayName || currentUser.email), 'success');
    }
    
    async function handleRegister(email, password, nombre) {
        if (!validateEmail(email)) throw new Error('Email inválido');
        if (!validatePassword(password)) throw new Error('Password inválido');
        if (!nombre || nombre.length < 2) throw new Error('Nombre inválido');
        
        const sanitizedName = sanitizeInput(nombre);
        const result = await auth.createUserWithEmailAndPassword(email, password);
        await result.user.updateProfile({ displayName: sanitizedName });
        currentUser = result.user;
        
        updateUIForAuth();
        navigateTo('/dashboard');
        showToast('✅ Registro exitoso', 'success');
    }
    
    async function logout() {
        await auth.signOut();
        currentUser = null;
        updateUIForAuth();
        navigateTo('/');
        showToast('Sesión cerrada', 'info');
    }
    
    function updateUIForAuth() {
        const isLoggedIn = !!currentUser;
        
        document.querySelectorAll('#protectedNav, #torneosNav, #perfilNav').forEach(el => {
            if (el) el.style.display = isLoggedIn ? 'flex' : 'none';
        });
        
        const loginNav = document.getElementById('loginNav');
        if (loginNav) loginNav.style.display = isLoggedIn ? 'none' : 'flex';
        
        if (isLoggedIn && (currentRoute === '/login' || currentRoute === '/register')) {
            navigateTo('/dashboard');
        }
    }
    
    // ============================================
    // 5. GESTIÓN DE TORNEOS (OFFLINE-FIRST)
    // ============================================
    
    async function saveTorneoOffline(torneoData) {
        const torneo = {
            ...torneoData,
            userId: currentUser.uid,
            syncStatus: isOnline ? 'synced' : 'pending',
            timestamp: new Date().toISOString(),
            offlineId: Date.now()
        };
        
        await saveToDB('offlineTorneos', torneo);
        
        if (!isOnline) {
            await saveToDB('pendingOps', {
                userId: currentUser.uid,
                type: 'CREATE_TORNEO',
                data: torneo,
                timestamp: new Date().toISOString()
            });
            showToast('📡 Guardado localmente (Offline)', 'info');
        } else {
            const torneoRef = database.ref(`torneos/${currentUser.uid}/${torneo.offlineId}`);
            await torneoRef.set(torneo);
            showToast('✅ Torneo guardado en la nube', 'success');
        }
        
        renderMisTorneos();
    }
    
    async function getTorneos() {
        if (isOnline && currentUser) {
            try {
                const snapshot = await database.ref(`torneos/${currentUser.uid}`).once('value');
                const firebaseTorneos = snapshot.val() || {};
                const torneosList = Object.keys(firebaseTorneos).map(key => ({
                    id: key,
                    ...firebaseTorneos[key]
                }));
                
                for (const t of torneosList) {
                    await saveToDB('offlineTorneos', { ...t, syncStatus: 'synced' });
                }
                return torneosList;
            } catch (e) {
                console.log('Error fetching from Firebase, usando local');
            }
        }
        
        const localTorneos = await getFromDB('offlineTorneos');
        return localTorneos.filter(t => t.userId === currentUser?.uid);
    }
    
    // ============================================
    // 6. RENDERIZADO DE PÁGINAS CON META TAGS DINÁMICOS
    // ============================================
    
    const pages = {

    function updateMetaTags(pageKey) {
        const page = pages[pageKey] || pages['/'];
        document.title = page.title;
        
        let ogTitle = document.querySelector('meta[property="og:title"]');
        let ogDesc = document.querySelector('meta[property="og:description"]');
        let ogImage = document.querySelector('meta[property="og:image"]');
        let twitterTitle = document.querySelector('meta[name="twitter:title"]');
        let twitterDesc = document.querySelector('meta[name="twitter:description"]');
        let twitterImage = document.querySelector('meta[name="twitter:image"]');
        
        if (!ogTitle) {
            ogTitle = document.createElement('meta');
            ogTitle.setAttribute('property', 'og:title');
            document.head.appendChild(ogTitle);
        }
        if (!ogDesc) {
            ogDesc = document.createElement('meta');
            ogDesc.setAttribute('property', 'og:description');
            document.head.appendChild(ogDesc);
        }
        if (!ogImage) {
            ogImage = document.createElement('meta');
            ogImage.setAttribute('property', 'og:image');
            document.head.appendChild(ogImage);
        }
        
        ogTitle.setAttribute('content', page.title);
        ogDesc.setAttribute('content', page.description);
        ogImage.setAttribute('content', `/images/og/${page.ogImage}`);
    }
    
    async function navigateTo(route) {
        const page = pages[route];
        if (!page) {
            navigateTo('/');
            return;
        }
        
        if (page.requiresAuth && !currentUser) {
            navigateTo('/login');
            showToast('🔒 Necesitas iniciar sesión', 'warning');
            return;
        }
        
        currentRoute = route;
        updateMetaTags(route);
        
        const content = document.getElementById('mainContent');
        content.innerHTML = '<div class="spinner"></div>';
        
        await page.render(content);
        
        // Actualizar navegación activa
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.dataset.route === route) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        
        // Actualizar URL sin recargar
        window.history.pushState({}, '', route);
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');

    function updateConnectionStatus() {
        isOnline = navigator.onLine;
        const statusDot = document.getElementById('connectionStatus');
        if (statusDot) {
            if (isOnline) {
                statusDot.classList.remove('offline');
                showToast('🟢 Conexión restablecida', 'success');
                if (currentUser) syncPendingOperations();
            } else {
                statusDot.classList.add('offline');
                showToast('🔴 Sin conexión - Modo offline activo', 'warning');
            }
        }
    }

        document.body.style.color = isDark ? '#eee' : '#1e293b';
        document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
    });
    
    // ============================================
    // 9. INICIALIZACIÓN
    // ============================================
    
    window.addEventListener('load', async () => {
        await initDB();
        updateConnectionStatus();
        
        window.addEventListener('online', () => updateConnectionStatus());
        window.addEventListener('offline', () => updateConnectionStatus());
        
        window.addEventListener('popstate', () => {
            navigateTo(window.location.pathname);
        });
        
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            updateUIForAuth();
            
            if (currentUser && isOnline) {
                await syncPendingOperations();
            }
            
            const initialRoute = window.location.pathname;
            if (pages[initialRoute]) {
                navigateTo(initialRoute);
            } else {
                navigateTo('/');
            }
        });
        
        // Navegación por botones
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                navigateTo(btn.dataset.route);
            });
        });
    });
