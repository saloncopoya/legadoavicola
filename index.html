<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="Legado Avícola - Aplicación profesional offline-first">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <title>Legado Avícola</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --secondary: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --dark: #1F2937;
            --light: #F3F4F6;
            --white: #FFFFFF;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--light);
            color: var(--dark);
        }

        #app {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--white);
            min-height: 100vh;
            box-shadow: var(--shadow);
        }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            padding: 1rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .app-header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-status {
            display: flex;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .online-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            background: rgba(255,255,255,0.2);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10B981;
            animation: pulse 2s infinite;
        }

        .offline-dot {
            background: #EF4444;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .btn-logout, .btn-login {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-logout:hover, .btn-login:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        /* Navigation */
        .app-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            background: var(--white);
            border-bottom: 2px solid var(--light);
            padding: 0.75rem 0.5rem;
            gap: 0.5rem;
            position: sticky;
            top: 70px;
            z-index: 99;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.75rem;
            background: none;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
            color: var(--dark);
            font-weight: 500;
        }

        .nav-icon {
            font-size: 1.5rem;
        }

        .nav-btn:hover {
            background: var(--light);
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: var(--primary);
            color: var(--white);
        }

        /* Main Content */
        .main-content {
            padding: 1.5rem;
            min-height: 500px;
        }

        /* Cards */
        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .card {
            background: var(--white);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid var(--light);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .card h3 {
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--white);
            margin: 15% auto;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            border-radius: 1rem;
            position: relative;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close {
            position: absolute;
            right: 1rem;
            top: 0.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: var(--dark);
            transition: color 0.3s;
        }

        .close:hover {
            color: var(--danger);
        }

        .modal-content input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 2px solid var(--light);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .modal-content input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1rem 0;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--secondary);
        }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 2rem;
            color: var(--danger);
            background: #FEE2E2;
            border-radius: 0.5rem;
        }

        .sync-banner {
            background: var(--warning);
            color: var(--dark);
            padding: 0.5rem;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            position: sticky;
            top: 120px;
            z-index: 98;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--dark);
            color: var(--white);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-nav {
                grid-template-columns: repeat(4, 1fr);
                top: 80px;
            }
            
            .nav-btn span:not(.nav-icon) {
                font-size: 0.7rem;
            }
            
            .modal-content {
                margin: 30% auto;
                padding: 1.5rem;
            }

            .sync-banner {
                top: 130px;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .app-nav {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .nav-icon {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-content">
                <h1>
                    <span>🏆</span>
                    <span>Legado Avícola</span>
                </h1>
                <div id="userStatus" class="user-status"></div>
            </div>
        </header>

        <div id="syncStatus" class="sync-banner" style="display: none;">
            🔄 Sincronizando cambios pendientes...
        </div>

        <nav class="app-nav">
            <button data-page="home" class="nav-btn active">
                <span class="nav-icon">🏠</span>
                <span>Inicio</span>
            </button>
            <button data-page="about" class="nav-btn">
                <span class="nav-icon">ℹ️</span>
                <span>Info</span>
            </button>
            <button data-page="contact" class="nav-btn">
                <span class="nav-icon">📞</span>
                <span>Contacto</span>
            </button>
            <button data-page="gallery" class="nav-btn">
                <span class="nav-icon">🖼️</span>
                <span>Galería</span>
            </button>
            <button data-page="torneo" class="nav-btn protected-btn" style="display:none;">
                <span class="nav-icon">🏆</span>
                <span>Torneo</span>
            </button>
            <button data-page="cotejo" class="nav-btn protected-btn" style="display:none;">
                <span class="nav-icon">⚽</span>
                <span>Cotejo</span>
            </button>
            <button data-page="juez" class="nav-btn protected-btn" style="display:none;">
                <span class="nav-icon">⚖️</span>
                <span>Juez</span>
            </button>
            <button data-page="perfil" class="nav-btn protected-btn" style="display:none;">
                <span class="nav-icon">👤</span>
                <span>Perfil</span>
            </button>
        </nav>

        <main id="mainContent" class="main-content">
            <div class="loading-spinner">
                <div class="spinner"></div>
                Cargando...
            </div>
        </main>

        <div id="loginModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="loginForm">
                    <h2>Iniciar Sesión</h2>
                    <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                    <input type="password" id="loginPassword" placeholder="Contraseña" required>
                    <button id="btnLogin" class="btn-primary">Ingresar</button>
                    <p style="text-align: center; margin-top: 1rem;">
                        ¿No tienes cuenta? <a href="#" id="showRegister">Regístrate</a>
                    </p>
                </div>
                <div id="registerForm" style="display:none;">
                    <h2>Registro</h2>
                    <input type="email" id="registerEmail" placeholder="Correo electrónico" required>
                    <input type="password" id="registerPassword" placeholder="Contraseña" required>
                    <button id="btnRegister" class="btn-primary">Registrarse</button>
                    <p style="text-align: center; margin-top: 1rem;">
                        ¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia Sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURACIÓN INICIAL ====================
        // Sistema de almacenamiento offline (IndexedDB)
        const DB_NAME = 'LegadoAvicolaDB';
        const DB_VERSION = 1;
        let db = null;
        
        // Cola de operaciones pendientes para sincronizar
        let pendingOperations = [];
        
        // Estado de conexión
        let isOnline = navigator.onLine;
        
        // Usuario actual
        let currentUser = null;
        let userPermissions = {};
        let currentPage = 'home';
        
        // Firebase config (REEMPLAZA CON TUS DATOS)
        const firebaseConfig = {
          apiKey: "AIzaSyASox7mRak5V0py29htEVWCVeipGpA0yfs",
  authDomain: "galloslivebadge.firebaseapp.com",
  databaseURL: "https://galloslivebadge-default-rtdb.firebaseio.com",
  projectId: "galloslivebadge",
  storageBucket: "galloslivebadge.firebasestorage.app",
  messagingSenderId: "979482928760",
  appId: "1:979482928760:web:3ea879dc4ee1e020df6f8d",
        };
        
        // ==================== INICIALIZAR INDEXEDDB ====================
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    
                    // Store para páginas cacheadas
                    if (!db.objectStoreNames.contains('pages')) {
                        const pagesStore = db.createObjectStore('pages', { keyPath: 'url' });
                        pagesStore.createIndex('url', 'url', { unique: true });
                    }
                    
                    // Store para datos de Firebase (offline cache)
                    if (!db.objectStoreNames.contains('firebaseData')) {
                        const firebaseStore = db.createObjectStore('firebaseData', { keyPath: 'path' });
                        firebaseStore.createIndex('path', 'path', { unique: true });
                    }
                    
                    // Store para operaciones pendientes
                    if (!db.objectStoreNames.contains('pendingOps')) {
                        const opsStore = db.createObjectStore('pendingOps', { keyPath: 'id', autoIncrement: true });
                        opsStore.createIndex('timestamp', 'timestamp');
                    }
                };
            });
        }
        
        // ==================== OPERACIONES DE INDEXEDDB ====================
        async function savePageToCache(url, html) {
            if (!db) return;
            const transaction = db.transaction(['pages'], 'readwrite');
            const store = transaction.objectStore('pages');
            store.put({ url, html, timestamp: Date.now() });
        }
        
        async function getPageFromCache(url) {
            if (!db) return null;
            const transaction = db.transaction(['pages'], 'readonly');
            const store = transaction.objectStore('pages');
            return new Promise((resolve) => {
                const request = store.get(url);
                request.onsuccess = () => resolve(request.result?.html || null);
                request.onerror = () => resolve(null);
            });
        }
        
        async function saveFirebaseData(path, data) {
            if (!db) return;
            const transaction = db.transaction(['firebaseData'], 'readwrite');
            const store = transaction.objectStore('firebaseData');
            store.put({ path, data, timestamp: Date.now() });
        }
        
        async function getFirebaseData(path) {
            if (!db) return null;
            const transaction = db.transaction(['firebaseData'], 'readonly');
            const store = transaction.objectStore('firebaseData');
            return new Promise((resolve) => {
                const request = store.get(path);
                request.onsuccess = () => resolve(request.result?.data || null);
                request.onerror = () => resolve(null);
            });
        }
        
        async function addPendingOperation(operation) {
            if (!db) return;
            const transaction = db.transaction(['pendingOps'], 'readwrite');
            const store = transaction.objectStore('pendingOps');
            await store.add({
                ...operation,
                timestamp: Date.now(),
                userId: currentUser?.uid
            });
            
            // Intentar sincronizar inmediatamente si hay conexión
            if (isOnline && currentUser) {
                syncPendingOperations();
            }
        }
        
        async function getPendingOperations() {
            if (!db) return [];
            const transaction = db.transaction(['pendingOps'], 'readonly');
            const store = transaction.objectStore('pendingOps');
            return new Promise((resolve) => {
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => resolve([]);
            });
        }
        
        async function clearPendingOperation(id) {
            if (!db) return;
            const transaction = db.transaction(['pendingOps'], 'readwrite');
            const store = transaction.objectStore('pendingOps');
            store.delete(id);
        }
        
        // ==================== SINCRONIZACIÓN CON FIREBASE ====================
        async function syncPendingOperations() {
            if (!isOnline || !currentUser) return;
            
            const operations = await getPendingOperations();
            if (operations.length === 0) return;
            
            document.getElementById('syncStatus').style.display = 'block';
            
            for (const op of operations) {
                try {
                    // Aquí implementas la sincronización según el tipo de operación
                    // Ejemplo: si es una escritura en Firebase
                    if (op.type === 'write' && window.firebaseDatabase) {
                        const { ref, set } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js');
                        const dbRef = ref(window.firebaseDatabase, op.path);
                        await set(dbRef, op.data);
                        await clearPendingOperation(op.id);
                        showToast('✅ Sincronizado: ' + op.path);
                    }
                } catch (error) {
                    console.error('Error syncing operation:', error);
                }
            }
            
            document.getElementById('syncStatus').style.display = 'none';
        }
        
        // ==================== CARGA DE PÁGINAS (OFFLINE-FIRST) ====================
        async function loadPage(pageName, isProtected = false) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>Cargando...</div>';
            
            const url = `pages/${isProtected ? 'protected' : 'public'}/${pageName}.html`;
            
            try {
                // Intentar obtener de la red (solo si hay internet)
                let response = null;
                let html = null;
                
                if (isOnline) {
                    try {
                        response = await fetch(url);
                        if (response.ok) {
                            html = await response.text();
                            // Guardar en IndexedDB para offline
                            await savePageToCache(url, html);
                        }
                    } catch (e) {
                        console.log('Network error, using cache');
                    }
                }
                
                // Si no hay internet o falló la red, obtener de cache
                if (!html) {
                    html = await getPageFromCache(url);
                    if (!html) {
                        throw new Error('Página no disponible offline');
                    }
                    showToast('📱 Modo offline - contenido cacheado');
                }
                
                mainContent.innerHTML = html;
                
                // Ejecutar scripts de la página
                const scripts = mainContent.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    newScript.textContent = oldScript.textContent;
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
                
            } catch (error) {
                console.error('Error loading page:', error);
                mainContent.innerHTML = `
                    <div class="error-message">
                        <h3>⚠️ Error al cargar la página</h3>
                        <p>Esta página no está disponible offline. Conéctate a internet para descargarla.</p>
                        <button onclick="location.reload()" class="btn-primary" style="margin-top: 1rem;">Reintentar</button>
                    </div>
                `;
            }
        }
        
        // ==================== AUTH Y PERMISOS ====================
        async function checkUserPermissions(userId) {
            try {
                // Intentar obtener de Firebase si hay conexión
                if (isOnline && window.firebaseDatabase) {
                    const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js');
                    const database = getDatabase(window.firebaseApp);
                    const permissionsRef = ref(database, `users/${userId}/permissions`);
                    const snapshot = await get(permissionsRef);
                    
                    if (snapshot.exists()) {
                        userPermissions = snapshot.val();
                        await saveFirebaseData(`users/${userId}/permissions`, userPermissions);
                    } else {
                        userPermissions = { torneo: false, cotejo: false, juez: false, perfil: true };
                        // Guardar en Firebase
                        const { set } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js');
                        await set(permissionsRef, userPermissions);
                        await saveFirebaseData(`users/${userId}/permissions`, userPermissions);
                    }
                } else {
                    // Offline: obtener de cache local
                    const cached = await getFirebaseData(`users/${userId}/permissions`);
                    if (cached) {
                        userPermissions = cached;
                    } else {
                        userPermissions = { torneo: false, cotejo: false, juez: false, perfil: true };
                    }
                    showToast('📱 Modo offline - permisos desde cache');
                }
                
                updateNavigationByPermissions();
                
            } catch (error) {
                console.error('Error checking permissions:', error);
                // Usar permisos por defecto en caso de error
                userPermissions = { torneo: false, cotejo: false, juez: false, perfil: true };
                updateNavigationByPermissions();
            }
        }
        
        function updateNavigationByPermissions() {
            const protectedBtns = document.querySelectorAll('.protected-btn');
            protectedBtns.forEach(btn => {
                const page = btn.getAttribute('data-page');
                if (userPermissions[page]) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            });
        }
        
        function updateAuthUI(user) {
            const userStatus = document.getElementById('userStatus');
            const loginModal = document.getElementById('loginModal');
            
            if (user) {
                userStatus.innerHTML = `
                    <div class="user-info">
                        <div class="online-status">
                            <div class="online-dot ${!isOnline ? 'offline-dot' : ''}"></div>
                            <span>${isOnline ? 'En línea' : 'Offline'}</span>
                        </div>
                        <span>👤 ${user.email}</span>
                        <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
                    </div>
                `;
                document.getElementById('btnLogout')?.addEventListener('click', () => {
                    if (window.firebaseAuth) {
                        const { signOut } = import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
                        signOut(window.firebaseAuth);
                    }
                });
                loginModal.style.display = 'none';
                currentUser = user;
                checkUserPermissions(user.uid);
                
                if (currentPage === 'torneo' || currentPage === 'cotejo' || currentPage === 'juez' || currentPage === 'perfil') {
                    loadPage(currentPage, true);
                }
            } else {
                userStatus.innerHTML = `
                    <div class="online-status">
                        <div class="online-dot ${!isOnline ? 'offline-dot' : ''}"></div>
                        <span>${isOnline ? 'En línea' : 'Offline'}</span>
                    </div>
                    <button id="btnShowLogin" class="btn-login">Iniciar Sesión</button>
                `;
                document.getElementById('btnShowLogin')?.addEventListener('click', () => {
                    if (isOnline) {
                        loginModal.style.display = 'block';
                    } else {
                        showToast('❌ Necesitas internet para iniciar sesión');
                    }
                });
                currentUser = null;
                userPermissions = {};
                updateNavigationByPermissions();
                
                if (currentPage === 'torneo' || currentPage === 'cotejo' || currentPage === 'juez' || currentPage === 'perfil') {
                    navigateTo('home');
                }
            }
        }
        
        function navigateTo(pageName) {
            currentPage = pageName;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.getAttribute('data-page') === pageName) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            const protectedPages = ['torneo', 'cotejo', 'juez', 'perfil'];
            const isProtected = protectedPages.includes(pageName);
            
            if (isProtected && !currentUser) {
                if (isOnline) {
                    document.getElementById('loginModal').style.display = 'block';
                } else {
                    showToast('❌ Necesitas internet para iniciar sesión');
                }
                return;
            }
            
            if (isProtected && !userPermissions[pageName]) {
                loadPage('home', false);
                showToast('🔒 No tienes permiso para acceder a esta página');
                return;
            }
            
            loadPage(pageName, isProtected);
        }
        
        function showToast(message, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }
        
        // ==================== MONITOREO DE CONEXIÓN ====================
        function updateConnectionStatus() {
            isOnline = navigator.onLine;
            const onlineDot = document.querySelector('.online-dot');
            if (onlineDot) {
                if (isOnline) {
                    onlineDot.classList.remove('offline-dot');
                    showToast('🟢 Conexión restablecida');
                    syncPendingOperations();
                } else {
                    onlineDot.classList.add('offline-dot');
                    showToast('🔴 Sin conexión - trabajando offline');
                }
            }
            
            // Actualizar UI de auth
            if (currentUser) {
                updateAuthUI(currentUser);
            } else {
                updateAuthUI(null);
            }
        }
        
        // ==================== INICIALIZAR TODO ====================
        async function init() {
            await initDB();
            
            // Cargar Firebase dinámicamente
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
            const { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } = 
                await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
            const { getDatabase, ref, get, set } = 
                await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js');
            
            window.firebaseApp = initializeApp(firebaseConfig);
            window.firebaseAuth = getAuth(window.firebaseApp);
            window.firebaseDatabase = getDatabase(window.firebaseApp);
            
            // Eventos de navegación
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const page = btn.getAttribute('data-page');
                    navigateTo(page);
                });
            });
            
            // Modal logic
            const modal = document.getElementById('loginModal');
            const closeBtn = document.querySelector('.close');
            closeBtn.onclick = () => modal.style.display = 'none';
            window.onclick = (event) => {
                if (event.target === modal) modal.style.display = 'none';
            };
            
            // Login/Register
            document.getElementById('showRegister')?.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            });
            
            document.getElementById('showLogin')?.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
            });
            
            document.getElementById('btnLogin')?.addEventListener('click', async () => {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                try {
                    await signInWithEmailAndPassword(window.firebaseAuth, email, password);
                    modal.style.display = 'none';
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            });
            
            document.getElementById('btnRegister')?.addEventListener('click', async () => {
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                try {
                    const userCredential = await createUserWithEmailAndPassword(window.firebaseAuth, email, password);
                    const database = getDatabase(window.firebaseApp);
                    await set(ref(database, `users/${userCredential.user.uid}/permissions`), {
                        torneo: false,
                        cotejo: false,
                        juez: false,
                        perfil: true
                    });
                    modal.style.display = 'none';
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            });
            
            onAuthStateChanged(window.firebaseAuth, (user) => {
                updateAuthUI(user);
            });
            
            // Monitorear conexión
            window.addEventListener('online', updateConnectionStatus);
            window.addEventListener('offline', updateConnectionStatus);
            updateConnectionStatus();
            
            // Cargar página inicial
            navigateTo('home');
        }
        
        // Iniciar la aplicación
        init();
    </script>


    <script>
// Registro del Service Worker MEJORADO
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      // Registrar SW
      const registration = await navigator.serviceWorker.register('/sw.js', {
        scope: '/'
      });
      
      console.log('SW registrado exitosamente:', registration);
      
      // Esperar a que el SW esté activo
      if (registration.installing) {
        console.log('SW instalando...');
        registration.installing.addEventListener('statechange', (e) => {
          if (e.target.state === 'installed') {
            console.log('SW instalado correctamente');
            // Recargar para que tome control
            if (!navigator.serviceWorker.controller) {
              window.location.reload();
            }
          }
        });
      }
      
      // Verificar si hay actualizaciones
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        console.log('Nueva versión del SW encontrada');
        
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Notificar al usuario que hay actualización
            if (confirm('Nueva versión disponible. ¿Recargar para actualizar?')) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
              window.location.reload();
            }
          }
        });
      });
      
      // Escuchar mensajes del SW
      navigator.serviceWorker.addEventListener('message', (event) => {
        console.log('Mensaje del SW:', event.data);
        if (event.data.type === 'ONLINE_SYNC') {
          showToast(event.data.message);
        }
      });
      
      // Verificar si el SW está controlando la página
      if (navigator.serviceWorker.controller) {
        console.log('SW controlando la página');
      } else {
        console.log('SW aún no controla la página');
      }
      
    } catch (error) {
      console.error('Error registrando SW:', error);
    }
  });
}

// Función para mostrar notificaciones
function showToast(message) {
  const toast = document.createElement('div');
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 9999;
    font-size: 14px;
    animation: fadeInOut 3s ease;
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Agregar estilo para el toast
const style = document.createElement('style');
style.textContent = `
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
    10% { opacity: 1; transform: translateX(-50%) translateY(0); }
    90% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  }
`;
document.head.appendChild(style);
</script>
